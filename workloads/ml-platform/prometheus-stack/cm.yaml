apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    pod-security.kubernetes.io/warn: "privileged"
    pod-security.kubernetes.io/audit: "privileged"
    pod-security.kubernetes.io/enforce: "privileged"
---
kind: ConfigMap
metadata:
  name: prometheus-community-values
  namespace: monitoring
apiVersion: v1
data:
  values.yaml: |
    # Default values for kube-prometheus-stack.
    # This is a YAML-formatted file.
    # Declare variables to be passed into your templates.

    additionalPrometheusRulesMap:
      dcgm-recording:
        groups:
        - interval: 30s
          name: dcgm.rules
          rules:
          - expr: avg_over_time(DCGM_FI_DEV_GPU_UTIL[5m])
            record: dcgm:gpu_util:avg5m
          - expr: avg_over_time(DCGM_FI_DEV_FB_USED[5m]) / 1024^3
            record: dcgm:fb_used_gib:avg5m
          - expr: avg_over_time(DCGM_FI_DEV_GPU_TEMP[5m])
            record: dcgm:gpu_temp:avg5m
    alertmanager:
      additionalLabels: {}
      alertmanagerSpec:
        additionalArgs: []
        additionalConfig: {}
        additionalConfigString: ""
        additionalPeers: []
        affinity: {}
        alertmanagerConfigMatcherStrategy: {}
        alertmanagerConfigNamespaceSelector: {}
        alertmanagerConfigSelector: {}
        alertmanagerConfiguration: {}
        automountServiceAccountToken: true
        clusterAdvertiseAddress: false
        clusterGossipInterval: ""
        clusterLabel: ""
        clusterPeerTimeout: ""
        clusterPushpullInterval: ""
        configMaps: []
        containers: []
        dnsConfig: {}
        dnsPolicy: ""
        externalUrl: null
        forceEnableClusterMode: false
        image:
          pullPolicy: IfNotPresent
          registry: quay.io
          repository: prometheus/alertmanager
          sha: ""
          tag: v0.28.1
        initContainers: []
        listenLocal: false
        logFormat: logfmt
        logLevel: info
        minReadySeconds: 0
        nodeSelector: {}
        paused: false
        persistentVolumeClaimRetentionPolicy: {}
        podAntiAffinity: soft
        podAntiAffinityTopologyKey: kubernetes.io/hostname
        podMetadata: {}
        portName: http-web
        priorityClassName: ""
        replicas: 1
        resources: {}
        retention: 120h
        routePrefix: /
        scheme: ""
        secrets: []
        securityContext:
          fsGroup: 2000
          runAsGroup: 2000
          runAsNonRoot: true
          runAsUser: 1000
          seccompProfile:
            type: RuntimeDefault
        serviceName: null
        storage: {}
        tlsConfig: {}
        tolerations: []
        topologySpreadConstraints: []
        useExistingSecret: false
        volumeMounts: []
        volumes: []
        web: {}
      annotations: {}
      apiVersion: v2
      config:
        global:
          resolve_timeout: 5m
        inhibit_rules:
        - equal:
          - namespace
          - alertname
          source_matchers:
          - severity = critical
          target_matchers:
          - severity =~ warning|info
        - equal:
          - namespace
          - alertname
          source_matchers:
          - severity = warning
          target_matchers:
          - severity = info
        - equal:
          - namespace
          source_matchers:
          - alertname = InfoInhibitor
          target_matchers:
          - severity = info
        - target_matchers:
          - alertname = InfoInhibitor
        receivers:
        - name: "null"
        route:
          group_by:
          - namespace
          group_interval: 5m
          group_wait: 30s
          receiver: "null"
          repeat_interval: 12h
          routes:
          - matchers:
            - alertname = "Watchdog"
            receiver: "null"
        templates:
        - /etc/alertmanager/config/*.tmpl
