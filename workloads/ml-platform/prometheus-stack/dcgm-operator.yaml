# NVIDIA DCGM Exporter — per-GPU metrics (utilization, memory, temperature, power, NVLINK)
# Requires: NVIDIA GPU Operator or node-level NVIDIA driver + DCGM installed
#
# Apply:
#   kubectl apply -f dcgm-exporter.yaml

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dcgm-exporter
  namespace: monitoring
  labels:
    app: dcgm-exporter
spec:
  selector:
    matchLabels:
      app: dcgm-exporter
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: dcgm-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9400"
    spec:
      # Only schedule on nodes that have NVIDIA GPUs.
      # Requires label: hardware-type=gpu
      # Apply with: kubectl label node <gpu-node> hardware-type=gpu gpu=on --overwrite
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: hardware-type
                    operator: In
                    values: ["gpu"]
      tolerations:
        - operator: Exists   # GPU nodes may have no-schedule taints

      hostNetwork: false
      hostPID: false

      containers:
        - name: dcgm-exporter
          image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.0-3.2.0-ubuntu22.04
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9400
              protocol: TCP
          env:
            - name: DCGM_EXPORTER_COLLECTORS
              # Comprehensive field list: utilization, memory, temperature, power, NVLINK, PCIe
              value: "/etc/dcgm-exporter/dcgm-counters.csv"
            - name: DCGM_EXPORTER_INTERVAL
              value: "5000"   # 5 s collection interval
            - name: DCGM_EXPORTER_KUBERNETES
              value: "true"   # annotate metrics with pod/namespace/container labels
            - name: DCGM_EXPORTER_KUBERNETES_GPU_ID_TYPE
              value: "uid"
          securityContext:
            runAsNonRoot: false
            capabilities:
              add: ["SYS_ADMIN"]
          volumeMounts:
            - name: pod-gpu-resources
              readOnly: true
              mountPath: /var/lib/kubelet/pod-resources
            - name: dcgm-counters
              mountPath: /etc/dcgm-exporter/dcgm-counters.csv
              subPath: dcgm-counters.csv
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 9400
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 9400
            initialDelaySeconds: 10
            periodSeconds: 10

      volumes:
        - name: pod-gpu-resources
          hostPath:
            path: /var/lib/kubelet/pod-resources
        - name: dcgm-counters
          configMap:
            name: dcgm-counters

---
# Custom DCGM field list — covers utilisation, memory, temp, power, NVLINK, throttle, ECC
apiVersion: v1
kind: ConfigMap
metadata:
  name: dcgm-counters
  namespace: monitoring
data:
  dcgm-counters.csv: |
    # Format: DCGM_FI_<FIELD>,<counter_type>,<description>
    DCGM_FI_DEV_GPU_UTIL,           gauge, GPU utilization (%)
    DCGM_FI_DEV_MEM_COPY_UTIL,      gauge, Memory bandwidth utilization (%)
    DCGM_FI_DEV_ENC_UTIL,           gauge, Encoder utilization (%)
    DCGM_FI_DEV_DEC_UTIL,           gauge, Decoder utilization (%)
    DCGM_FI_DEV_FB_FREE,            gauge, Framebuffer free memory (MiB)
    DCGM_FI_DEV_FB_USED,            gauge, Framebuffer used memory (MiB)
    DCGM_FI_DEV_FB_TOTAL,           gauge, Framebuffer total memory (MiB)
    DCGM_FI_DEV_GPU_TEMP,           gauge, GPU temperature (°C)
    DCGM_FI_DEV_MEMORY_TEMP,        gauge, Memory temperature (°C)
    DCGM_FI_DEV_POWER_USAGE,        gauge, Power draw (W)
    DCGM_FI_DEV_TOTAL_ENERGY_CONSUMPTION, counter, Total energy consumed (mJ)
    DCGM_FI_DEV_PCIE_TX_THROUGHPUT, counter, PCIe TX throughput (KB/s)
    DCGM_FI_DEV_PCIE_RX_THROUGHPUT, counter, PCIe RX throughput (KB/s)
    DCGM_FI_DEV_NVLINK_BANDWIDTH_TOTAL, counter, NVLink bandwidth total (KB/s)
    DCGM_FI_DEV_SM_CLOCK,           gauge, SM clock (MHz)
    DCGM_FI_DEV_MEM_CLOCK,          gauge, Memory clock (MHz)
    DCGM_FI_DEV_CLOCK_THROTTLE_REASONS, gauge, Clk throttle bitmask
    DCGM_FI_DEV_ECC_SBE_VOL_TOTAL, counter, ECC single-bit errors (volatile)
    DCGM_FI_DEV_ECC_DBE_VOL_TOTAL, counter, ECC double-bit errors (volatile)
    DCGM_FI_DEV_XID_ERRORS,         gauge, XID error count (last)
    DCGM_FI_PROF_GR_ENGINE_ACTIVE,  gauge, Graphics engine activity
    DCGM_FI_PROF_SM_ACTIVE,         gauge, SM active (fraction)
    DCGM_FI_PROF_SM_OCCUPANCY,      gauge, SM occupancy (fraction)
    DCGM_FI_PROF_PIPE_TENSOR_ACTIVE,gauge, Tensor core activity
    DCGM_FI_PROF_PIPE_FP64_ACTIVE,  gauge, FP64 pipe activity
    DCGM_FI_PROF_PIPE_FP32_ACTIVE,  gauge, FP32 pipe activity
    DCGM_FI_PROF_PIPE_FP16_ACTIVE,  gauge, FP16 pipe activity
    DCGM_FI_PROF_DRAM_ACTIVE,       gauge, DRAM active (fraction)
    DCGM_FI_PROF_PCIE_TX_BYTES,     counter, PCIe TX bytes/s
    DCGM_FI_PROF_PCIE_RX_BYTES,     counter, PCIe RX bytes/s

---
apiVersion: v1
kind: Service
metadata:
  name: dcgm-exporter
  namespace: monitoring
  labels:
    app: dcgm-exporter
spec:
  clusterIP: None   # Headless — Prometheus scrapes individual pod IPs
  selector:
    app: dcgm-exporter
  ports:
    - name: metrics
      port: 9400
      targetPort: 9400

---
# ServiceMonitor so kube-prometheus-stack picks up DCGM metrics automatically
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: dcgm-exporter
  namespace: monitoring
  labels:
    release: prometheus   # must match Helm release name (helm list -n monitoring)
spec:
  selector:
    matchLabels:
      app: dcgm-exporter
  endpoints:
    - port: metrics
      interval: 15s
      path: /metrics
      # Inject the k8s node name so Overview.tsx can resolve GPU → node correctly.
      # Without this, metrics only carry Hostname=<pod-name> which doesn't match
      # the node name returned by the /nodes API.
      # endpoints role uses __meta_kubernetes_endpoint_node_name;
      # pod role uses __meta_kubernetes_pod_node_name — include both as fallbacks.
      relabelings:
        - sourceLabels: [__meta_kubernetes_endpoint_node_name]
          regex: (.+)
          targetLabel: kubernetes_node
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          regex: (.+)
          targetLabel: kubernetes_node
  namespaceSelector:
    matchNames:
      - monitoring
