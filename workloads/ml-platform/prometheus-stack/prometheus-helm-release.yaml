apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: monitoring
spec:
  interval: 5m
  releaseName: prometheus

  chart:
    spec:
      chart: kube-prometheus-stack
      version: 80.10.0
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring

  values:
    prometheus:
      prometheusSpec:
        # Equivalent to --set-json 'storageSpec={}'
        storageSpec: {}

        # Equivalent to --set retentionSize=""
        retentionSize: ""

    grafana:
      # ── grafana.ini ───────────────────────────────────────────────────────────
      grafana.ini:
        auth.anonymous:
          enabled: true
          org_name: Main Org.
          org_role: Viewer
        security:
          allow_embedding: true

      # ── Sidecar: watches ConfigMaps labelled grafana_datasource=1 ─────────────
      sidecar:
        datasources:
          enabled: true
          label: grafana_datasource
          labelValue: "1"
          # Reload Grafana when a datasource ConfigMap changes
          # (sidecar sends SIGHUP; no pod restart needed)
          reloadURL: "http://localhost:3000/api/admin/provisioning/datasources/reload"
          skipReload: false
        dashboards:
          enabled: true
          label: grafana_dashboard
          labelValue: "1"
          searchNamespace: monitoring
          # Hot-reload dashboards without pod restart
          reloadURL: "http://localhost:3000/api/admin/provisioning/dashboards/reload"
          skipReload: false
          # Mount all dashboard ConfigMaps under this folder name in the UI
          folderAnnotation: grafana_folder
          provider:
            foldersFromFilesStructure: false
    
  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3