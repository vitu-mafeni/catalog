apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: monitoring
spec:
  interval: 5m
  releaseName: prometheus

  chart:
    spec:
      chart: kube-prometheus-stack
      version: 80.10.0
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring

  values:
    prometheus:
      prometheusSpec:
        # Equivalent to --set-json 'storageSpec={}'
        storageSpec: {}

        # Equivalent to --set retentionSize=""
        retentionSize: ""

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3