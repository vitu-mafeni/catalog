apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources-dcnlab
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  datasources.yaml: |
    apiVersion: 1

    # Explicitly delete any stale entries with wrong UIDs from previous
    # imperative runs (equivalent to your "clean up duplicates" script section)
    deleteDatasources:
      - name: Prometheus
        orgId: 1
      - name: Alertmanager
        orgId: 1
      - name: Loki
        orgId: 1

    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        url: http://prometheus-kube-prometheus-prometheus:9090
        access: proxy
        isDefault: true
        orgId: 1
        version: 1
        editable: false

      - name: Alertmanager
        uid: alertmanager
        type: alertmanager
        url: http://prometheus-kube-prometheus-alertmanager:9093
        access: proxy
        orgId: 1
        version: 1
        editable: false
        jsonData:
          implementation: prometheus

      - name: Loki
        uid: loki
        type: loki
        url: http://loki.monitoring.svc.cluster.local:3100
        access: proxy
        orgId: 1
        version: 1
        editable: false