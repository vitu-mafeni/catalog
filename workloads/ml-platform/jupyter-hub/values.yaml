apiVersion: v1
kind: Namespace
metadata: # kpt-merge: /jhub-ns
  name: jhub-ns
  annotations:
    internal.kpt.dev/upstream-identifier: '|Namespace|default|jhub-ns'
---
apiVersion: v1
kind: ConfigMap
metadata: # kpt-merge: jhub-ns/jhub-values
  name: jhub-values
  namespace: jhub-ns
  annotations:
    internal.kpt.dev/upstream-identifier: '|ConfigMap|jhub-ns|jhub-values'
data:
  values.yaml: |
    proxy:
      secretToken: "79044be905ddf54c21eb22b585f3b2b1f4679c972fcb6f479eeec9d8dfad4ea7"
      service:
        type: NodePort
        nodePorts:
          http: 30080
          https: 30443

    # Chart's built-in jupyterhub-idle-culler service. Left unset, the chart
    # defaults to timeout=3600 (1 hour) — that default was silently culling
    # singleuser servers mid-training-job, since "inactive" here means no
    # traffic reached the Hub API, not whether the kernel was busy computing.
    # Raised to ~2 months so long-running training jobs survive; a genuinely
    # abandoned server still gets reclaimed eventually rather than never.
    cull:
      enabled: true
      timeout: 5184000   # 60 days
      every: 600
      concurrency: 10

    hub:
      services:
        quota-api:
          admin: true          # needs admin scope to list all users + delete servers
          apiToken: "79044be905ddf54c21eb22b585f3b2b1f4679c972fcb6f479eeec9d8dfad4ea7"
      config:
        JupyterHub:
          authenticator_class: oauthenticator.generic.GenericOAuthenticator

        GenericOAuthenticator:
          # ── Keycloak OIDC endpoints ──────────────────────────────
          # Replace 192.168.3.234 with your node IP or Keycloak ingress hostname
          client_id: "jupyterhub-client"
          client_secret: "jupyterhub-secret-changeme"

          # oauth_callback_url: "http://192.168.3.234:30080/hub/oauth_callback"
          # authorize_url: "http://192.168.3.234:30090/realms/jupyterhub/protocol/openid-connect/auth"
          # token_url: "http://192.168.3.234:30090/realms/jupyterhub/protocol/openid-connect/token"
          # userdata_url: "http://192.168.3.234:30090/realms/jupyterhub/protocol/openid-connect/userinfo"
          # logout_redirect_url is set dynamically in extraConfig.adminAccess via the
          # QUOTA_PORTAL_URL env var → {portal}/logout relay page.
          # Do NOT set it here: c.GenericOAuthenticator.* is more specific than
          # c.OAuthenticator.* in Traitlets and would override the extraConfig value,
          # sending users to Keycloak's confirmation page instead of the portal relay.
          oauth_callback_url: "http://192.168.3.234:30080/hub/oauth_callback"

          token_url: "http://keycloak.keycloak.svc.cluster.local:8080/realms/jupyterhub/protocol/openid-connect/token"
          userdata_url: "http://keycloak.keycloak.svc.cluster.local:8080/realms/jupyterhub/protocol/openid-connect/userinfo"

          # Use the external IP for the browser redirect
          authorize_url: "http://192.168.3.234:30090/realms/jupyterhub/protocol/openid-connect/auth"


          # ── Token claims ─────────────────────────────────────────
          username_claim: "preferred_username"
          # userdata_params:
          #   state: state
          scope:
            - openid
            - profile
            - email
            # - groups
          # All Keycloak users can log in; kernel quota API limits what they see
          allow_all: true
          # Skip JupyterHub's own /hub/login page — redirect directly to Keycloak.
          # Combined with the existing Keycloak session cookie this makes the
          # OAuth round-trip fully silent (~400 ms, no login form shown).
          auto_login: true
          # ── Group sync ───────────────────────────────────────────
          # Groups from Keycloak token are synced to JupyterHub groups
          # which drive the profile_list filtering below
          enable_auth_state: true
          # ── Access control ───────────────────────────────────────
          # Only users in at least one of these groups can log in
          # allowed_groups:
          #   - cpu-users
          #   - gpu-users
          #   - gpu-power-users
          #   - researchers

          # Deliberately NO admin_users list here. JupyterHub's own admin flag
          # (spawner.user.admin) grants access to the native /hub/admin panel
          # and the admin_access proxy feature — both bypass the platform UI
          # entirely, which is exactly what must not happen. Platform admin
          # status lives only in quota-api's own RBAC (Keycloak platform-admin
          # group → is_admin claim), and is forwarded into user_options by
          # /me/spawn — never derived from a JupyterHub-native admin flag.
        #custom pre_spawn_hook to call quota API and set allowed kernels per-user

      extraEnv:
        # For local dev: use the node IP where fastapi dev is running
        # For production (quota-api deployed in k8s): use http://quota-api.jhub-ns.svc.cluster.local:8000
        QUOTA_API_URL: "http://10.244.0.1:9000"
        QUOTA_API_TOKEN: "testtoken123"   # must match QUOTA_API_TOKEN in .env.local
        # URL of the portal — JupyterHub redirects here after /hub/logout so the
        # browser lands back on the portal login page (not JH's own login page).
        # Set this to wherever index.html is served from.
        QUOTA_PORTAL_URL: "http://192.168.3.200:3001"
        # Comma-separated list of kernel spec IDs shown when a user spawns a CPU-only
        # server (no GPU profile selected) or spawns directly through JupyterHub's UI.
        # GPU kernel names are intentionally excluded — users must go through the portal
        # and select a GPU profile to access those kernels.
        # Values must exactly match the kernel spec IDs registered in Enterprise Gateway.
        QUOTA_CPU_KERNELS: "python3,python_kubernetes"

      extraConfig:
        oauthNoConfirm: |
          # Skip the "Authorize access" confirmation page for ALL OAuth clients.
          #
          # JupyterHub's OAuthAuthorizeHandler.needs_oauth_confirm() already tries
          # to skip for a user's own server, but it requires the spawner to have its
          # oauth_client_id registered in hub memory at the exact moment the OAuth
          # dance is triggered — a race that sometimes loses on first login.
          #
          # The safest fix is to monkey-patch needs_oauth_confirm so it always
          # returns False (never show the confirmation page).  Access control is
          # handled entirely by Keycloak + quota-api, so this is safe here.
          import logging as _log
          from jupyterhub.apihandlers.auth import OAuthAuthorizeHandler

          def _no_confirm(self, user, oauth_client, requested_scopes):
              return False          # always auto-approve

          OAuthAuthorizeHandler.needs_oauth_confirm = _no_confirm
          _log.getLogger("JupyterHub").info(
              "oauth_no_confirm: OAuthAuthorizeHandler patched — "
              "confirmation page disabled for all clients"
          )

        adminAccess: |
          # Deliberately NOT setting c.JupyterHub.admin_access here. That
          # traitlet proxies a JupyterHub-native admin user directly into
          # another user's server through the Hub's own UI — bypassing the
          # platform entirely. Admin "open a user's server" access is instead
          # handled exclusively by quota-api's own token-minting endpoint
          # (POST /workloads/admin/open-token), which mints a short-lived,
          # scoped access token via the Hub API using quota-api's own service
          # credentials — never a human JupyterHub admin session.
          #
          # Keep admin hub sessions alive for 14 days so re-login is rare.
          c.JupyterHub.cookie_max_age_days = 14
          # Allow users to run more than one named server simultaneously.
          c.JupyterHub.allow_named_servers = True
          c.JupyterHub.named_server_limit_per_user = 5
          # Users are provisioned via the admin API (not via OAuth login flow),
          # so they have no stored OAuth refresh tokens. Disabling refresh_pre_spawn
          # prevents OAuthenticator from blocking spawns with "auth has expired"
          # for users who have never gone through the interactive OAuth login.
          # Authentication is enforced by Keycloak JWT validation in the quota-api.
          c.Authenticator.refresh_pre_spawn = False
          # After /hub/logout clears the hub session cookie, redirect to the
          # portal's /logout relay page.  That page reads the Keycloak logout URL
          # stored in sessionStorage by the portal before navigating here, then
          # redirects to Keycloak to clear the SSO session as well.
          # JupyterHub 5.x: the redirect lives on the Authenticator, not JupyterHub.
          import os as _os
          _portal = _os.environ.get("QUOTA_PORTAL_URL", "").strip()
          if _portal:
              c.OAuthenticator.logout_redirect_url = _portal.rstrip("/") + "/logout"
        loadRoles: |
          c.JupyterHub.load_roles = [
              {
                  "name": "quota-api-token-role",
                  "description": "Allow quota-api service to create user tokens",
                  "scopes": ["admin:users", "tokens!user"],
                  "services": ["quota-api"],
              },
              {
                  "name": "jupyterhub-idle-culler-role",
                  "description": "Allow idle culler to list and stop idle servers",
                  "scopes": [
                      "list:users",
                      "read:users:activity",
                      "read:servers",
                      "delete:servers",
                      "admin:users",
                  ],
                  "services": ["jupyterhub-idle-culler"],
              },
          ]

        tokenToUser: |
          # Keycloak access tokens are JWTs — decode them directly instead of
          # calling the userinfo endpoint (which fails with 401 from inside the cluster
          # because Keycloak's KC_HOSTNAME_STRICT rejects requests on the internal URL).
          import base64, json, logging
          from oauthenticator.generic import GenericOAuthenticator
          from oauthenticator.oauth2 import OAuthenticator

          _jh_log = logging.getLogger("jh.token_to_user")
          _orig_token_to_user = OAuthenticator.token_to_user

          async def _jwt_token_to_user(self, token_info):
              access_token = token_info.get("access_token", "")
              if access_token:
                  try:
                      parts = access_token.split(".")
                      if len(parts) >= 2:
                          payload = parts[1]
                          payload += "=" * (4 - len(payload) % 4)
                          claims = json.loads(base64.urlsafe_b64decode(payload))
                          if claims.get("preferred_username"):
                              _jh_log.debug("JWT decoded for user: %s", claims["preferred_username"])
                              return claims
                  except Exception as exc:
                      _jh_log.warning("JWT decode failed, falling back to userinfo: %s", exc)
              return await _orig_token_to_user(self, token_info)

          GenericOAuthenticator.token_to_user = _jwt_token_to_user

        kernelAccess: |
          import json, os, logging
          from tornado.httpclient import AsyncHTTPClient, HTTPRequest, HTTPError

          _log = logging.getLogger("quota_hook")
          _API = os.environ["QUOTA_API_URL"]
          _TOK = os.environ["QUOTA_API_TOKEN"]
          _FALLBACK_KERNEL = "python3"

          def _auth_headers():
              return {"Authorization": f"Bearer {_TOK}", "Content-Type": "application/json"}

          # CPU kernel names shown when no GPU profile is selected.
          # Matches QUOTA_CPU_KERNELS env var (split on comma, stripped).
          _CPU_KERNELS = [
              k.strip()
              for k in os.environ.get("QUOTA_CPU_KERNELS", _FALLBACK_KERNEL).split(",")
              if k.strip()
          ] or [_FALLBACK_KERNEL]

          async def _pre_spawn(spawner):
              username = spawner.user.name
              # kernel_slug is populated when the user spawns via the portal
              # (portal passes it as user_options); empty for CPU/direct JH UI spawns
              kernel_slug = (spawner.user_options or {}).get("kernel_slug", "")

              # ── 0. Enforce platform-only spawning ────────────────────────────────
              # Only quota-api (the platform) may spawn servers — direct spawning
              # through JupyterHub's own UI/API is disabled entirely, including
              # CPU-only requests. quota-api stamps every spawn it issues with
              # _platform_token, a secret (QUOTA_API_TOKEN) that a browser-driven
              # spawn through JupyterHub's native form has no way to supply, since
              # it never reaches the browser. Applies to admins too, for consistency.
              _platform_token = (spawner.user_options or {}).get("_platform_token", "")
              if _platform_token != _TOK:
                  _log.warning(
                      "Rejecting spawn for %s — missing/invalid _platform_token "
                      "(direct JupyterHub spawn attempt, not via the platform)",
                      username,
                  )
                  raise RuntimeError(
                      "Direct spawning through JupyterHub is disabled. "
                      "Please start your server from the platform UI instead."
                  )

              # ── 1. Fetch profiles ────────────────────────────────────────────────
              # Platform admins bypass per-user profile restrictions and may use any
              # GPU kernel slug.  We fetch the full catalogue from /kernels/profiles
              # (a dict keyed by slug) and convert it to the same list shape that the
              # per-user endpoint returns so the rest of the hook is unchanged.
              #
              # is_admin comes from user_options (set by /me/spawn from quota-api's
              # own Keycloak-derived RBAC), NOT spawner.user.admin — JupyterHub has
              # no native admin_users configured, so that flag is always False.
              # Trusting user_options here is safe: we already verified
              # _platform_token above, so this value was set by quota-api's own
              # already-authenticated check, not supplied directly by the browser.
              is_admin = bool((spawner.user_options or {}).get("is_admin", False))

              profiles = []
              try:
                  client = AsyncHTTPClient()
                  if is_admin and kernel_slug:
                      # Admin path: fetch all profiles from the global catalogue
                      req = HTTPRequest(
                          f"{_API}/kernels/profiles",
                          headers=_auth_headers(),
                          request_timeout=5.0,
                      )
                      resp = await client.fetch(req)
                      all_profiles = json.loads(resp.body)   # dict: slug → {display_name, kubespawner_override, gpu_fraction, …}
                      # Normalise to list shape expected below
                      profiles = [
                          {"slug": s, "kubespawner_override": v["kubespawner_override"],
                           "display_name": v.get("display_name", s),
                           "gpu_fraction": v.get("gpu_fraction", 0.0),
                           "kernel_gpu_mem_mb": v.get("kernel_gpu_mem_mb", 0),
                           "kernel_gpu_cores": v.get("kernel_gpu_cores", 0)}
                          for s, v in all_profiles.items()
                      ]
                      _log.info("admin %s: loaded %d profiles from catalogue", username, len(profiles))
                  else:
                      req = HTTPRequest(
                          f"{_API}/quotas/users/{username}/profiles",
                          headers=_auth_headers(),
                          request_timeout=5.0,
                      )
                      resp = await client.fetch(req)
                      profiles = json.loads(resp.body)
              except Exception as exc:
                  _log.warning("quota-api profile fetch failed for %s: %s — falling back to %s",
                               username, exc, _FALLBACK_KERNEL)

              # ── 2. Build kernel whitelist ────────────────────────────────────────
              # Rule: the whitelist is locked to EXACTLY the kernel the user chose at
              # spawn time.  This prevents switching to a different-sized GPU kernel
              # inside the same server (e.g. spawned with 50% → can't use 25% kernel).
              #
              # Portal GPU spawn  (kernel_slug set)  → only the selected GPU kernel
              # Portal CPU spawn  (kernel_slug empty) → CPU kernels only
              # Direct JH UI spawn (kernel_slug empty) → CPU kernels only
              #   (users must go through the portal to access GPU kernels)

              if kernel_slug:
                  # Find the profile that matches the selected slug
                  selected = next(
                      (p for p in profiles if p.get("slug") == kernel_slug),
                      None,
                  )
                  if selected:
                      kso_env = selected.get("kubespawner_override", {}).get("environment", {})
                      gw_name = kso_env.get("JUPYTER_GATEWAY_KERNEL_NAME", "")
                      kernels = [gw_name] if gw_name else [_FALLBACK_KERNEL]
                      # Forward KERNEL_* vars from KSO (anything not computed below).
                      for _k, _v in kso_env.items():
                          if _k.startswith("KERNEL_"):
                              spawner.environment[_k] = str(_v)
                      # Override GPU vars computed directly by quota-api so that
                      # stale or missing KSO environment values never silently revert
                      # the allocation back to the EG tier's hardcoded defaults.
                      #
                      # kernel_gpu_mem_mb / kernel_gpu_cores are computed by quota-api
                      # (see gpu_alloc.calculate_allocation) from the LIVE minimum GPU
                      # VRAM across GPU nodes. There is deliberately NO static
                      # fallback and NO nvidia.com/gpumem-percentage anywhere in this
                      # hook: HAMi's DRA driver only enforces memory limits via the
                      # absolute nvidia.com/gpumem (MiB) resource, never a percentage,
                      # so a guessed/stale MiB value could be wrong for whichever GPU
                      # model the kernel actually lands on. If quota-api didn't supply
                      # both values we refuse to spawn a GPU kernel at all rather than
                      # risk an unbounded (or wrongly-sized) GPU allocation.
                      _gf = selected.get("gpu_fraction") or 0.0
                      if _gf > 0:
                          _mem_mb = selected.get("kernel_gpu_mem_mb") or 0
                          _cores  = selected.get("kernel_gpu_cores") or 0
                          if not _mem_mb or not _cores:
                              _log.error(
                                  "kernel_gpu_mem_mb/kernel_gpu_cores missing/zero for "
                                  "%s (slug=%r, mem_mb=%r, cores=%r) — refusing to "
                                  "spawn GPU kernel rather than risk an unbounded or "
                                  "incorrectly-sized GPU allocation",
                                  username, kernel_slug, _mem_mb, _cores,
                              )
                              raise RuntimeError(
                                  "GPU sizing unavailable from quota-api — cannot "
                                  "safely spawn this GPU profile. Try again shortly "
                                  "or contact an admin."
                              )
                          spawner.environment["KERNEL_GPU_MEM"]   = str(_mem_mb)
                          spawner.environment["KERNEL_GPU_CORES"] = str(_cores)
                          # Framework from EG kernel prefix (tf- / pytorch-)
                          _fw = "tensorflow" if gw_name.startswith("tf-") else \
                                "pytorch"    if gw_name.startswith("pytorch-") else "all"
                          spawner.environment["KERNEL_FRAMEWORK"] = _fw
                      # Display name from profile display_name field
                      _dname = selected.get("display_name", "")
                      if _dname:
                          spawner.environment["KERNEL_DISPLAY_NAME"] = _dname
                  else:
                      # slug not found in this user's profiles — deny gracefully
                      _log.warning(
                          "kernel_slug %r not in profiles for %s — restricting to CPU",
                          kernel_slug, username,
                      )
                      kernels = _CPU_KERNELS
              else:
                  # No GPU profile selected: CPU only
                  kernels = _CPU_KERNELS

              spawner.environment["KERNEL_WHITELIST"] = ",".join(kernels)
              spawner.environment["JUPYTER_GATEWAY_KERNEL_NAME"] = kernels[0]
              # Propagate quota-api credentials into the singleuser pod so that
              # jupyter_server_config.py can call /enforce-kernel on every kernel launch.
              # This is belt-and-suspenders: singleuser.extraEnv should also carry these,
              # but setting them here guarantees they are always present.
              spawner.environment["QUOTA_API_URL"]   = _API
              spawner.environment["QUOTA_API_TOKEN"] = _TOK
              _log.info("kernel whitelist for %s (slug=%r): %s", username, kernel_slug, kernels)

              # ── 2. Enforce quota (secondary safeguard for direct JH UI spawns) ───
              # The portal enforces atomically in POST /me/spawn; this catches spawns
              # that bypass the portal entirely.  Fail-open on any non-429 error so a
              # quota-api outage never prevents all spawning.
              #
              # IMPORTANT: pass server_name so the API excludes the currently-spawning
              # server from its active count.  JH adds it to the active list before
              # pre_spawn_hook fires, and the portal already wrote its tracking row —
              # without exclusion every portal GPU spawn would be falsely denied.
              _server_name = spawner.name or "(default)"
              try:
                  client = AsyncHTTPClient()
                  req = HTTPRequest(
                      f"{_API}/quotas/users/{username}/enforce-spawn",
                      method="POST",
                      body=json.dumps({"kernel_slug": kernel_slug, "server_name": _server_name}),
                      headers=_auth_headers(),
                      request_timeout=5.0,
                  )
                  await client.fetch(req)
                  _log.info("quota check passed for %s (kernel_slug=%r)", username, kernel_slug)
              except HTTPError as exc:
                  if exc.code == 429:
                      try:
                          detail = json.loads(exc.response.body).get("detail", {})
                          msg = detail.get("message", "Server quota exceeded") if isinstance(detail, dict) else str(detail)
                      except Exception:
                          msg = "Server quota exceeded — stop an existing server first"
                      _log.warning("quota DENIED for %s: %s", username, msg)
                      raise RuntimeError(msg)
                  # Non-429 (network error, 5xx, etc.) → fail-open
                  _log.warning("quota-api enforce-spawn failed for %s (HTTP %s) — allowing spawn",
                               username, exc.code)
              except Exception as exc:
                  _log.warning("quota-api unreachable for %s: %s — allowing spawn", username, exc)

          async def _post_stop(spawner):
              """Clean up GPU tracking when a server is stopped via JH directly."""
              username = spawner.user.name
              server_name = spawner.name or "(default)"
              try:
                  client = AsyncHTTPClient()
                  req = HTTPRequest(
                      f"{_API}/quotas/users/{username}/servers/{server_name}",
                      method="DELETE",
                      allow_nonstandard_methods=True,
                      headers=_auth_headers(),
                      request_timeout=5.0,
                  )
                  await client.fetch(req)
                  _log.info("quota tracking cleared for %s/%s", username, server_name)
              except HTTPError as exc:
                  if exc.code != 404:
                      _log.warning("quota untrack failed for %s/%s: HTTP %s",
                                   username, server_name, exc.code)
              except Exception as exc:
                  _log.warning("quota untrack failed for %s/%s: %s", username, server_name, exc)

          c.KubeSpawner.pre_spawn_hook = _pre_spawn
          c.KubeSpawner.post_stop_hook = _post_stop
          c.KubeSpawner.profile_list = []

        blockNativeUI: |
          # kernelAccess above stops direct spawning through JupyterHub's native
          # UI (rejects any spawn missing _platform_token), but that only fires
          # on submit — the /hub/home "Start My Server" page, /hub/spawn's
          # profile-picker form, and /hub/token's own API-token-creation UI
          # were still fully reachable and renderable by any authenticated
          # user. This closes that gap by redirecting all three straight to
          # the platform portal instead, so the native UI is never shown at
          # all, not just non-functional once you get there.
          #
          # /hub/token specifically lets a user mint their own long-lived API
          # tokens outside quota-api's tracking — worth closing for the same
          # reason spawning is locked down: all platform access should be
          # auditable through quota-api, not a side door in JupyterHub itself.
          #
          # Only the page handlers are touched — /hub/api/* (used by quota-api
          # itself) is a completely separate handler tree and is unaffected.
          import os as _os
          import logging as _log2
          from jupyterhub.handlers.pages import HomeHandler, SpawnHandler, TokenPageHandler

          _portal_url = _os.environ.get("QUOTA_PORTAL_URL", "").strip().rstrip("/")

          def _redirect_to_portal(self, *args, **kwargs):
              target = _portal_url or "/hub/login"
              self.redirect(target, permanent=False)

          HomeHandler.get = _redirect_to_portal
          SpawnHandler.get = _redirect_to_portal
          TokenPageHandler.get = _redirect_to_portal
          _log2.getLogger("JupyterHub").info(
              "blockNativeUI: /hub/home, /hub/spawn, and /hub/token now redirect to %s",
              _portal_url or "(QUOTA_PORTAL_URL unset — falling back to /hub/login)",
          )

    singleuser:
      defaultUrl: "/lab"
      profileList: []
      extraEnv:
        CHECKPOINT_NAMESPACE: "enterprise-gateway"
        KERNEL_USERNAME: "k"
        # {username} is KubeSpawner's own environment-variable templating —
        # substituted with the REAL spawning user at pod-create time, same
        # mechanism already used for {username}/{userid} elsewhere in
        # kubespawner. The in-notebook kernel_checkpoint extension itself
        # sends no auth/identity of any kind (confirmed live) and can't be
        # modified (ships prebuilt in the notebook image), so identity is
        # smuggled in via this URL instead: the checkpoint-apiserver's new
        # /u/{username}/api/v1/... routes (see stateful-migration-operator
        # internal/apiserver/server.go) read the username straight from the
        # path and stamp/verify the migration.dcnlab.com/user label on the
        # CheckpointBackup CR itself. Every user's own pod gets a URL with
        # their OWN username already baked in — no per-user config needed.
        CHECKPOINT_API_URL: "http://checkpoint-apiserver.stateful-migration.svc.cluster.local:8090/u/{username}"


        JUPYTER_GATEWAY_URL: "http://enterprise-gateway.enterprise-gateway.svc.cluster.local:8888"
        JUPYTER_GATEWAY_WS_URL: "ws://enterprise-gateway.enterprise-gateway.svc.cluster.local:8888"
        JUPYTER_GATEWAY_REQUEST_TIMEOUT: "300"
        JUPYTER_GATEWAY_CONNECT_TIMEOUT: "120"
        JUPYTER_GATEWAY_WS_PING_INTERVAL: "30"
        KERNEL_SERVICE_ACCOUNT_NAME: "enterprise-gateway-sa"
        QUOTA_API_URL: "http://10.244.0.1:9000"      # ← add change
        QUOTA_API_TOKEN: "testtoken123"
      cmd: ["/opt/conda/bin/jupyterhub-singleuser"]
      image:
        name: docker.io/vitu1/jupyterhub-singleuser
        tag: "checkpoint-restore-v2"
        pullPolicy: IfNotPresent
      storage:
        type: dynamic
        extraVolumes:
          - name: labext-shared
            emptyDir: {}
        extraVolumeMounts:
          # Only the jupyterlab-missed-output-replay subdirectory of the shared
          # emptyDir lands on the extension's own subdirectory under
          # labextensions/ — no change to the base singleuser image needed.
          - name: labext-shared
            mountPath: /opt/conda/share/jupyter/labextensions/jupyterlab-missed-output-replay
            subPath: jupyterlab-missed-output-replay
          # Same pattern for the pending-resource notification extension.
          - name: labext-shared
            mountPath: /opt/conda/share/jupyter/labextensions/jupyterlab-pod-pending-notice
            subPath: jupyterlab-pod-pending-notice
      initContainers:
        # Delivers the frontend half of the browser-refresh output-loss fix
        # (see eg_reconnect_buffer.py, the server-side half, in extraFiles
        # below) — copies the built labextension into the shared volume above,
        # which then lands inside the singleuser container's own
        # labextensions/ directory. Same pattern as EG's kernelspecs
        # initContainer (see enterprise-gateway-kernelspecs / eg-templates).
        # Build/push from jupyterlab-missed-output-replay/Dockerfile before
        # deploying; rebuild+push again any time src/index.ts changes.
        - name: install-missed-output-replay
          image: docker.io/vitu1/singleuser-extensions:missed-output-replay-0.1.7
          volumeMounts:
            - name: labext-shared
              mountPath: /shared-labext
        # Delivers the pending-resource notification labextension (see
        # jupyterlab-pod-pending-notice/ in this repo) — same shared-volume
        # hand-off as install-missed-output-replay above. Build/push from
        # jupyterlab-pod-pending-notice/Dockerfile before deploying; rebuild+push
        # again any time its src/index.ts changes. The image tag below is a
        # placeholder — update once the image is actually built and pushed.
        - name: install-pod-pending-notice
          image: docker.io/vitu1/singleuser-extensions:pod-pending-notice-0.1.1
          volumeMounts:
            - name: labext-shared
              mountPath: /shared-labext

      # custom configs
      extraFiles:

        eg-reconnect-buffer:
          mountPath: /etc/jupyter/eg_reconnect_buffer.py
          stringData: |
            """Server-side output-replay buffer for Enterprise Gateway kernels.

            Root cause (confirmed live against the real cluster, 2026-07-07):
            JupyterLab correlates iopub output to a cell via an in-memory
            ``execute_request.msg_id -> cell`` map built only by the page instance that
            sent the request. A browser refresh wipes that map, so even output that
            arrives correctly over a freshly reconnected websocket has nowhere to go and
            gets silently dropped by the frontend.

            Two designs were tried and rejected before this one:

            1. A persistent listener opening a SECOND, independent GatewayKernelClient
               per kernel (tied to the kernel's lifetime, not any one browser tab).
               Worked in isolated testing, but destabilized the EG connection once a
               real browser was also attached — EG doesn't tolerate a second concurrent
               subscriber opened this way from the same jupyter_server process (observed
               live: repeated "connection closed" cycling for one kernel_id).

            2. Passively tapping the EXISTING browser-facing GatewayWebSocketConnection
               only (no second connection). Turned out to capture NOTHING once the one
               real connection drops: ``disconnect()`` tears down the upstream link to
               EG immediately (unlike the local-kernel path, which explicitly buffers
               via ``multi_kernel_manager.start_buffering()``), so there is no listener
               at all during a genuine single-tab refresh gap. It only appeared to work
               in earlier tests because a SECOND, still-open browser tab happened to be
               relaying the same iopub broadcast the whole time.

            Current design: reattachment, not a second connection. ``disconnect()`` is
            confirmed (by reading jupyter_server/services/kernels/websocket.py) to fire
            ONLY from ``KernelWebsocketHandler.on_close()`` — i.e. only when one
            browser tab's websocket closes, never for real kernel shutdown (that's a
            separate path via the kernel manager). So it's always safe to keep the
            existing upstream connection to EG alive for a grace period instead of
            tearing it down:

              * ``disconnect()`` is patched to NOT close the upstream socket. Instead it
                parks the connection object in a process-global registry and schedules
                a real teardown after a grace period.
              * ``connect()`` is patched to check that registry first. If a parked
                connection exists for this kernel_id, the NEW connection object doesn't
                dial EG again at all — it redirects the OLD (still running) connection's
                ``websocket_handler`` to itself (so live output flows to the new browser
                tab) and delegates its own ``handle_incoming_message``/``disconnect``
                calls back to the OLD object. The OLD object's read loop — and hence its
                one real upstream socket — lives for the kernel's whole session,
                surviving any number of reconnects within grace windows, so there is
                NEVER a second concurrent connection to the same kernel.
              * Cell attribution still comes from watching outgoing execute_request
                messages (JupyterLab stamps ``metadata.cellId``), same as before.

            Delivery: enable as a server extension —
                c.ServerApp.jpserver_extensions = {"eg_reconnect_buffer": True}
            No image rebuild required; drop into the same custom-Python config block
            that already patches GatewayKernelSpecManager / GatewayMappingKernelManager
            in jh-config.yaml.
            """
            from __future__ import annotations

            import collections
            import json
            import logging
            import threading
            import time
            import uuid
            from datetime import datetime, timezone

            log = logging.getLogger("eg_reconnect_buffer")

            _MAX_PER_KERNEL = 4000
            _MAX_AGE_SECONDS = 6 * 3600
            _GRACE_PERIOD_SECONDS = 45

            _buffers: dict[str, "collections.deque"] = {}
            _cell_map: dict[str, dict[str, str]] = {}
            _seq_counters: dict[str, int] = {}
            _orphaned: dict[str, dict] = {}
            _seen_msg_ids: dict[str, "collections.deque"] = {}
            _seen_msg_id_sets: dict[str, set] = {}
            # Last iopub "status" content.execution_state seen per kernel — the ONLY way
            # to know a kernel is busy at the moment a browser (re)attaches, since a
            # genuinely long-running/infinite cell emits "busy" exactly once at
            # execution start and never again until it finishes. A page that attaches
            # after that single broadcast (any reload, or first load onto an
            # already-running kernel) never receives it and is stuck showing "idle"
            # forever, even while correctly blocking new execution — confirmed live
            # 2026-07-08.
            _last_status: dict[str, str] = {}
            # execute_request msg_ids sent but whose OWN matching "idle" hasn't arrived
            # yet, per kernel — see the "idle-while-still-busy" note in
            # handle_outgoing_message for why this exists.
            _pending_executes: dict[str, set] = {}
            # Kernel ids with a genuine restart/shutdown in flight — see disconnect()'s
            # use of this. Confirmed live 2026-07-08: without this, clicking Restart
            # hung the kernel at "Unknown" forever (see _wrap_kernel_manager_lifecycle's
            # docstring for the full mechanism).
            _restarting: set = set()
            _lock = threading.Lock()

            _OUTPUT_MSG_TYPES = {"stream", "execute_result", "display_data", "error", "clear_output"}


            def _record_request(kernel_id: str, msg: dict) -> None:
                # NOTE: real JupyterLab traffic was found to only nest msg_type under
                # "header" for client->server messages (unlike some server->client
                # frames, which duplicate it at the top level too) — checking only the
                # top-level key here silently matched nothing, so nothing was ever
                # recorded, no matter how much real output the kernel produced.
                msg_type = msg.get("msg_type") or (msg.get("header") or {}).get("msg_type")
                if msg_type != "execute_request":
                    return
                cell_id = (msg.get("metadata") or {}).get("cellId")
                msg_id = (msg.get("header") or {}).get("msg_id") or msg.get("msg_id")
                if not cell_id or not msg_id:
                    # Diagnostic: if this still doesn't fire correctly, the printed
                    # metadata dict shows exactly what key real JupyterLab actually
                    # used, instead of guessing again. Safe to remove once confirmed
                    # working — this bypasses the logger deliberately (see log.info
                    # calls elsewhere in this module never appearing in captured logs
                    # despite the code paths they're in definitely running).
                    import sys
                    print(f"eg_reconnect_buffer: execute_request missing cellId/msg_id — "
                          f"metadata={msg.get('metadata')!r} header={msg.get('header')!r}",
                          file=sys.stderr, flush=True)
                    return
                with _lock:
                    m = _cell_map.setdefault(kernel_id, {})
                    m[msg_id] = cell_id
                    if len(m) > _MAX_PER_KERNEL:
                        for k in list(m.keys())[: len(m) - _MAX_PER_KERNEL]:
                            m.pop(k, None)
                    pending = _pending_executes.setdefault(kernel_id, set())
                    pending.add(msg_id)
                    if len(pending) > _MAX_PER_KERNEL:
                        # Defensive only — every add here is normally matched by a
                        # discard once that request's own "idle" arrives (see
                        # handle_outgoing_message), so this shouldn't grow unbounded in
                        # practice. Guards against a genuinely never-completing request
                        # (e.g. a kernel that died mid-execution) pinning memory forever.
                        for k in list(pending)[: len(pending) - _MAX_PER_KERNEL]:
                            pending.discard(k)


            def _record_output_msg(
                kernel_id: str, msg_type: str, parent_msg_id: str | None, msg_id: str | None, content
            ) -> None:
                if msg_type not in _OUTPUT_MSG_TYPES or not parent_msg_id:
                    return
                with _lock:
                    cell_id = _cell_map.get(kernel_id, {}).get(parent_msg_id)
                    if not cell_id:
                        return
                    # iopub is a broadcast — every simultaneously-connected observer
                    # (e.g. two browser tabs, or a reattached connection alongside a
                    # diagnostic client) independently calls handle_outgoing_message for
                    # the SAME message. Dedupe on the message's own unique msg_id so
                    # multiple observers don't multiply entries in the buffer.
                    seen = _seen_msg_ids.setdefault(kernel_id, collections.deque(maxlen=_MAX_PER_KERNEL))
                    seen_set = _seen_msg_id_sets.setdefault(kernel_id, set())
                    if msg_id:
                        if msg_id in seen_set:
                            return
                        if len(seen) == seen.maxlen:
                            seen_set.discard(seen[0])  # about to be evicted by the append below
                        seen.append(msg_id)
                        seen_set.add(msg_id)
                    buf = _buffers.setdefault(kernel_id, collections.deque(maxlen=_MAX_PER_KERNEL))
                    seq = _seq_counters.get(kernel_id, 0) + 1
                    _seq_counters[kernel_id] = seq
                    buf.append({
                        "seq": seq, "cell_id": cell_id, "parent_msg_id": parent_msg_id,
                        "msg_type": msg_type, "content": content, "ts": time.time(),
                    })


            def get_missed(kernel_id: str, since_seq: int = 0) -> list[dict]:
                cutoff = time.time() - _MAX_AGE_SECONDS
                with _lock:
                    buf = _buffers.get(kernel_id)
                    if not buf:
                        return []
                    return [m for m in buf if m["seq"] > since_seq and m["ts"] >= cutoff]


            def get_pending_executions(kernel_id: str) -> list[dict]:
                # Tells the client WHICH cells have a real, still-in-flight
                # execute_request whose originating page is gone — not just what output
                # has arrived so far. The client uses this to register its own
                # Kernel.IFuture for that msg_id, so JupyterLab's native machinery
                # (execution count, the running-cell spinner, and eventually resolving
                # cleanly when the real reply/idle arrives) takes back over instead of
                # everything being faked by one-off buffer replay forever.
                with _lock:
                    cell_map = _cell_map.get(kernel_id) or {}
                    pending = _pending_executes.get(kernel_id) or set()
                    return [
                        {"msg_id": msg_id, "cell_id": cell_map[msg_id]}
                        for msg_id in pending
                        if msg_id in cell_map
                    ]


            async def _fetch_gateway_execution_state(kernel_id: str) -> str | None:
                # _last_status is only ever populated by PASSIVELY witnessing an iopub
                # "status" broadcast — but a long-running cell only emits "busy" ONCE, at
                # execution start, and this process may not have existed yet (pod
                # restart) or simply never had a browser attached at that exact moment
                # (this very reconnect scenario). Enterprise Gateway itself is the one
                # thing that has ALWAYS had a live connection to the real kernel process,
                # so ask it directly for ground truth instead of trusting our own cache.
                try:
                    from jupyter_server.gateway.gateway_client import GatewayClient
                    from jupyter_server.utils import url_path_join
                    from tornado.escape import url_escape
                    from tornado.httpclient import AsyncHTTPClient, HTTPRequest

                    gw = GatewayClient.instance()
                    url = url_path_join(gw.url or "", gw.kernels_endpoint, url_escape(kernel_id))
                    kwargs = gw.load_connection_args(request_timeout=5.0)
                    request = HTTPRequest(url, method="GET", **kwargs)
                    response = await AsyncHTTPClient().fetch(request)
                    model = json.loads(response.body)
                    return model.get("execution_state")
                except Exception:
                    log.debug("eg_reconnect_buffer: gateway kernel-state query failed", exc_info=True)
                    return None


            def _synthetic_status_message(execution_state: str) -> str:
                # Mirrors the real wire shape (msg_type/msg_id duplicated at both the top
                # level AND under header, matching what real server->client frames use —
                # see _record_request's docstring for the client->server asymmetry this
                # is NOT subject to, since this is a server-injected message).
                msg_id = uuid.uuid4().hex
                now = datetime.now(timezone.utc).isoformat()
                payload = {
                    "header": {
                        "msg_id": msg_id, "msg_type": "status", "username": "eg_reconnect_buffer",
                        "session": "eg_reconnect_buffer", "date": now, "version": "5.3",
                    },
                    "msg_id": msg_id,
                    "msg_type": "status",
                    "parent_header": {},
                    "metadata": {},
                    "content": {"execution_state": execution_state},
                    "buffers": [],
                    "channel": "iopub",
                }
                return json.dumps(payload)


            def forget_kernel(kernel_id: str) -> None:
                with _lock:
                    _buffers.pop(kernel_id, None)
                    _cell_map.pop(kernel_id, None)
                    _seq_counters.pop(kernel_id, None)
                    _seen_msg_ids.pop(kernel_id, None)
                    _seen_msg_id_sets.pop(kernel_id, None)
                    _last_status.pop(kernel_id, None)
                    _pending_executes.pop(kernel_id, None)
                    orphan = _orphaned.pop(kernel_id, None)
                if orphan:
                    try:
                        from tornado.ioloop import IOLoop
                        IOLoop.current().remove_timeout(orphan["timer"])
                    except Exception:
                        pass


            def _wrap_connection_class():
                from jupyter_server.gateway.connections import GatewayWebSocketConnection
                from tornado.ioloop import IOLoop

                if getattr(GatewayWebSocketConnection, "_eg_reconnect_buffer_patched", False):
                    return

                orig_connect = GatewayWebSocketConnection.connect
                orig_disconnect = GatewayWebSocketConnection.disconnect
                orig_incoming = GatewayWebSocketConnection.handle_incoming_message
                orig_outgoing = GatewayWebSocketConnection.handle_outgoing_message

                def handle_incoming_message(self, message: str) -> None:
                    try:
                        msg = json.loads(message)
                        _record_request(self.kernel_id, msg)
                    except Exception:
                        log.debug("eg_reconnect_buffer: failed handling incoming message", exc_info=True)
                    return orig_incoming(self, message)

                def handle_outgoing_message(self, incoming_msg: str, *args) -> None:
                    try:
                        msg = json.loads(incoming_msg)
                        msg_type = msg.get("msg_type") or (msg.get("header") or {}).get("msg_type")
                        parent_msg_id = (msg.get("parent_header") or {}).get("msg_id")
                        msg_id = (msg.get("header") or {}).get("msg_id") or msg.get("msg_id")
                        if msg_type == "status":
                            state = (msg.get("content") or {}).get("execution_state")
                            if state == "idle":
                                # Every request is bracketed by its own busy/idle pair per
                                # the messaging spec — including jupyter_server's periodic
                                # kernel_info_request "nudge" used to check a remote
                                # kernel is still alive. That nudge's own idle is a
                                # legitimate message, but it has nothing to do with a
                                # real cell that's still executing — forwarding it
                                # verbatim makes JupyterLab flip to "idle" (disabling
                                # Interrupt, among other things) while the actual
                                # execution keeps running. Confirmed live 2026-07-08:
                                # streams kept arriving well after the UI showed idle.
                                # Only trust an idle that matches a REAL outstanding
                                # execute_request we ourselves recorded; anything else,
                                # while a real execution is still open, gets swallowed
                                # rather than forwarded.
                                with _lock:
                                    pending = _pending_executes.get(self.kernel_id) or set()
                                    if parent_msg_id in pending:
                                        pending.discard(parent_msg_id)
                                        _last_status[self.kernel_id] = "idle"
                                    elif pending:
                                        log.debug(
                                            "eg_reconnect_buffer: suppressing stray idle for kernel %s "
                                            "(parent %s not a tracked execute_request; %d still outstanding)",
                                            self.kernel_id, parent_msg_id, len(pending),
                                        )
                                        return
                                    else:
                                        _last_status[self.kernel_id] = "idle"
                            elif state:
                                with _lock:
                                    _last_status[self.kernel_id] = state
                        _record_output_msg(self.kernel_id, msg_type, parent_msg_id, msg_id, msg.get("content"))
                    except Exception:
                        log.debug("eg_reconnect_buffer: failed handling outgoing message", exc_info=True)
                    return orig_outgoing(self, incoming_msg, *args)

                async def _sync_status_on_attach(target, kernel_id: str) -> None:
                    # Ask Enterprise Gateway for ground truth first; only fall back to
                    # our own passively-observed cache if that query fails (e.g. EG
                    # briefly unreachable) — see _fetch_gateway_execution_state's
                    # docstring for why the cache alone isn't trustworthy on its own.
                    state = await _fetch_gateway_execution_state(kernel_id)
                    if state:
                        with _lock:
                            _last_status[kernel_id] = state
                    else:
                        with _lock:
                            state = _last_status.get(kernel_id)
                    if state == "busy":
                        try:
                            target.websocket_handler.write_message(_synthetic_status_message("busy"))
                            log.info("eg_reconnect_buffer: synced busy status for kernel %s", kernel_id)
                        except Exception:
                            log.debug("eg_reconnect_buffer: failed to synthesize status message", exc_info=True)

                async def connect(self):
                    kernel_id = self.kernel_id
                    with _lock:
                        orphan = _orphaned.pop(kernel_id, None)
                    if orphan is not None:
                        old = orphan["conn"]
                        try:
                            IOLoop.current().remove_timeout(orphan["timer"])
                        except Exception:
                            pass
                        # Redirect the still-running old connection's output to THIS
                        # browser tab, and make this new instance delegate back to it —
                        # `old` keeps the one real upstream link to EG alive for the
                        # kernel's whole session, across any number of reconnects.
                        old.websocket_handler = self.websocket_handler
                        old.disconnected = False
                        old.retry = 0
                        self.handle_incoming_message = old.handle_incoming_message
                        self.disconnect = old.disconnect
                        log.info("eg_reconnect_buffer: reattached browser to existing EG connection for kernel %s", kernel_id)
                        await _sync_status_on_attach(old, kernel_id)
                        return
                    await orig_connect(self)
                    # Also covers a genuinely FRESH connection (no orphan record at all —
                    # e.g. a second browser tab, or the grace period already expired) —
                    # this page's kernel connection has equally never seen any status
                    # broadcast for a kernel that was already busy before it attached.
                    await _sync_status_on_attach(self, kernel_id)

                def disconnect(self):
                    kernel_id = self.kernel_id
                    with _lock:
                        was_restarting = kernel_id in _restarting
                        _restarting.discard(kernel_id)
                    if was_restarting:
                        # This disconnect is the browser's OWN client-side reconnect()
                        # cycle following a genuine Restart/Shutdown — the underlying
                        # kernel process is intentionally going away (or already gone).
                        # Parking this connection would make the very next connect()
                        # "reattach" the browser to a link tied to the now-dead process
                        # instead of dialing Enterprise Gateway fresh, which is exactly
                        # what left the kernel stuck at "Unknown" after Restart
                        # (confirmed live 2026-07-08). Tear it down for real so the
                        # next connect() falls through to a clean orig_connect().
                        return orig_disconnect(self)
                    if self.ws is None and (self.ws_future is None or self.ws_future.done()):
                        return orig_disconnect(self)

                    def real_disconnect():
                        with _lock:
                            still_parked = _orphaned.get(kernel_id, {}).get("conn") is self
                            if still_parked:
                                _orphaned.pop(kernel_id, None)
                        if still_parked:
                            orig_disconnect(self)

                    timer = IOLoop.current().call_later(_GRACE_PERIOD_SECONDS, real_disconnect)
                    with _lock:
                        _orphaned[kernel_id] = {"conn": self, "timer": timer}
                    # Deliberately NOT calling orig_disconnect / touching self.ws or
                    # self.disconnected here — keep the upstream link alive so iopub
                    # output keeps flowing into handle_outgoing_message (still buffered
                    # via the patch above) while no browser tab is attached.

                GatewayWebSocketConnection.connect = connect
                GatewayWebSocketConnection.disconnect = disconnect
                GatewayWebSocketConnection.handle_incoming_message = handle_incoming_message
                GatewayWebSocketConnection.handle_outgoing_message = handle_outgoing_message
                GatewayWebSocketConnection._eg_reconnect_buffer_patched = True
                log.info("eg_reconnect_buffer: patched GatewayWebSocketConnection (connect/disconnect/incoming/outgoing)")


            def _wrap_kernel_manager_lifecycle():
                # Marks a kernel as "genuinely restarting/shutting down" for the benefit
                # of disconnect() above. Enterprise Gateway's restart/shutdown REST calls
                # go through GatewayMappingKernelManager, never through
                # GatewayWebSocketConnection — but the BROWSER's own client-side
                # kernel.restart() always closes and reopens its websocket immediately
                # afterward (jupyterlab's KernelConnection.reconnect()), and that
                # close/reopen looks IDENTICAL, from disconnect()'s point of view, to a
                # plain browser-tab refresh. Without this, the reconnect after a real
                # restart got "helpfully" reattached to the connection for the OLD,
                # now-dead kernel process instead of dialing fresh.
                from jupyter_server.gateway.managers import GatewayMappingKernelManager
                from tornado.ioloop import IOLoop

                if getattr(GatewayMappingKernelManager, "_eg_reconnect_buffer_lifecycle_patched", False):
                    return

                orig_restart = GatewayMappingKernelManager.restart_kernel
                orig_shutdown = GatewayMappingKernelManager.shutdown_kernel

                def _mark_restarting(kernel_id: str) -> None:
                    with _lock:
                        _restarting.add(kernel_id)
                    # Safety net: if no browser is attached at all when this fires (so
                    # disconnect() never runs to consume the flag), don't leave it set
                    # forever — a stray future reconnect wrongly skipping reattachment
                    # is a far smaller cost than what this fixes.
                    IOLoop.current().call_later(30, lambda: _restarting.discard(kernel_id))

                async def restart_kernel(self, kernel_id, *args, **kwargs):
                    _mark_restarting(kernel_id)
                    result = await orig_restart(self, kernel_id, *args, **kwargs)
                    # The kernel_id is reused but the underlying process is now a brand
                    # new one — every execute_request msg_id we were tracking for it
                    # belongs to a process that no longer exists and will never send a
                    # matching reply. Stale entries here would make the client try to
                    # adopt (or the busy-status sync report) an execution that can
                    # never complete.
                    forget_kernel(kernel_id)
                    return result

                async def shutdown_kernel(self, kernel_id, *args, **kwargs):
                    _mark_restarting(kernel_id)
                    try:
                        return await orig_shutdown(self, kernel_id, *args, **kwargs)
                    finally:
                        forget_kernel(kernel_id)

                GatewayMappingKernelManager.restart_kernel = restart_kernel
                GatewayMappingKernelManager.shutdown_kernel = shutdown_kernel
                GatewayMappingKernelManager._eg_reconnect_buffer_lifecycle_patched = True
                log.info("eg_reconnect_buffer: patched GatewayMappingKernelManager (restart_kernel/shutdown_kernel)")


            def _make_handler():
                from jupyter_server.base.handlers import APIHandler
                import tornado.web

                class MissedOutputHandler(APIHandler):
                    @tornado.web.authenticated
                    def get(self, kernel_id: str) -> None:
                        since = int(self.get_query_argument("since_seq", "0"))
                        self.finish(json.dumps({
                            "messages": get_missed(kernel_id, since),
                            "pending_executions": get_pending_executions(kernel_id),
                        }))

                return MissedOutputHandler


            def install(serverapp) -> None:
                _wrap_connection_class()
                try:
                    _wrap_kernel_manager_lifecycle()
                except Exception:
                    # Non-fatal: worst case, Restart/Shutdown reconnects go through the
                    # (previously existing) reattach path instead of a fresh dial. Never
                    # let this block the rest of the extension from loading.
                    log.warning("eg_reconnect_buffer: failed to patch kernel manager lifecycle", exc_info=True)
                # Routes must be registered relative to base_url — JupyterHub sets this
                # to /user/<name>/<server>/ for singleuser servers, and jupyter_server's
                # OWN routes (e.g. .../api/kernels/<id>/channels) are all registered
                # this way. A bare, unprefixed path only matches requests hitting the
                # server root directly, which is never what the browser actually
                # requests through the Hub's proxy — every request is 404 in that case,
                # even though the extension itself loaded and patched correctly.
                from jupyter_server.utils import url_path_join

                pattern = url_path_join(serverapp.base_url, r"api/kernels/(?P<kernel_id>[\w-]+)/missed_output")
                route = (pattern, _make_handler())
                serverapp.web_app.add_handlers(".*$", [route])
                log.info("eg_reconnect_buffer: registered %s", pattern)


            def _jupyter_server_extension_points():
                return [{"module": "eg_reconnect_buffer"}]


            def _load_jupyter_server_extension(serverapp):
                install(serverapp)

        pod-pending-status:
          mountPath: /etc/jupyter/pod_pending_status.py
          stringData: |
            """Server-side proxy exposing kernel pod-pending status to JupyterLab.

            Companion to eg_reconnect_buffer.py — same delivery mechanism (a Jupyter
            server extension dropped into the singleuser pod via jh-config.yaml's
            extraFiles, enabled through c.ServerApp.jpserver_extensions), same route
            style (relative to serverapp.base_url so it works behind JupyterHub's
            per-user proxy prefix).

            IMPORTANT — this is keyed by USERNAME, not kernel_id, and that's deliberate,
            not an oversight. The original design polled a specific kernel_id, but that
            can never work for the case that actually matters: jupyter_server's
            POST /api/sessions blocks synchronously for the ENTIRE kernel-start attempt
            (confirmed against real logs — "Request start kernel: kernel_id=None, ..."
            followed, on a stuck-Pending kernel, by nothing else until either success or
            Enterprise Gateway's launch-timeout error 250+ seconds later). The browser
            never learns the kernel_id while the pod is Pending, so a kernel_id-keyed
            poll has nothing to poll during exactly the window this feature exists for.
            Polling by username sidesteps that entirely — the frontend doesn't need to
            know which kernel_id it's waiting on, just whether ANY of the user's kernels
            are currently blocked on cluster resources.

            This module does NOT talk to Kubernetes directly — quota-api already has an
            in-cluster K8s client and the kernel_id -> pod mapping (see k8s.py's
            _k8s_eg_pod_map / pod_pending_reason). Duplicating that here would mean
            giving the singleuser pod's own service account new cross-namespace RBAC
            just to read enterprise-gateway pods, for information quota-api already
            computes. Instead this simply forwards the request server-side to
            quota-api's own GET /workloads/{username}/kernels — the same endpoint the
            portal Dashboard's pending-resource banner polls — using the
            QUOTA_API_URL / QUOTA_API_TOKEN already injected into every singleuser pod's
            environment (see spawner.environment below — the same values the hub itself
            uses to call quota-api), and JUPYTERHUB_USER (also standard JupyterHub
            spawner env) to identify which user's kernels to check.

            Delivery: enable as a server extension —
                c.ServerApp.jpserver_extensions.update({"pod_pending_status": True})
            """
            from __future__ import annotations

            import json
            import logging
            import os

            log = logging.getLogger("pod_pending_status")


            async def _fetch_pending_status() -> dict:
                quota_api_url = os.environ.get("QUOTA_API_URL", "")
                token = os.environ.get("QUOTA_API_TOKEN", "")
                username = os.environ.get("JUPYTERHUB_USER", "")
                if not quota_api_url or not token or not username:
                    log.warning(
                        "pod_pending_status: QUOTA_API_URL/QUOTA_API_TOKEN/JUPYTERHUB_USER not set in environment"
                    )
                    return {"pending_reason": None, "kernel_name": None}
                try:
                    from tornado.httpclient import AsyncHTTPClient, HTTPRequest

                    url = f"{quota_api_url.rstrip('/')}/workloads/{username}/kernels"
                    request = HTTPRequest(
                        url, method="GET",
                        headers={"Authorization": f"Bearer {token}"},
                        request_timeout=5.0,
                    )
                    response = await AsyncHTTPClient().fetch(request)
                    kernels = json.loads(response.body)
                    for k in kernels or []:
                        if k.get("pending_reason") == "insufficient_resources":
                            return {
                                "pending_reason": "insufficient_resources",
                                "kernel_name": k.get("kernel_name"),
                            }
                    return {"pending_reason": None, "kernel_name": None}
                except Exception:
                    log.debug("pod_pending_status: quota-api lookup failed for user %s", username, exc_info=True)
                    return {"pending_reason": None, "kernel_name": None}


            def _make_handler():
                from jupyter_server.base.handlers import APIHandler
                import tornado.web

                class PendingStatusHandler(APIHandler):
                    @tornado.web.authenticated
                    async def get(self) -> None:
                        self.finish(json.dumps(await _fetch_pending_status()))

                return PendingStatusHandler


            def install(serverapp) -> None:
                from jupyter_server.utils import url_path_join

                pattern = url_path_join(serverapp.base_url, r"api/kernels/pending_status")
                route = (pattern, _make_handler())
                serverapp.web_app.add_handlers(".*$", [route])
                log.info("pod_pending_status: registered %s", pattern)


            def _jupyter_server_extension_points():
                return [{"module": "pod_pending_status"}]


            def _load_jupyter_server_extension(serverapp):
                install(serverapp)

        kernel-filter-config:
          mountPath: /etc/jupyter/jupyter_server_config.py
          stringData: |
            import sys
            sys.path.insert(0, "/etc/jupyter")
            # NOTE: c.ServerApp.jpserver_extensions is a Dict trait — reading it
            # directly here (before the real ServerApp has loaded this config)
            # returns a LazyConfigValue placeholder, not a dict, so
            # "{**(c.ServerApp.jpserver_extensions or {}), ...}" raises
            # TypeError: 'LazyConfigValue' object is not a mapping. .update() is
            # the correct, traitlets-idiomatic way to merge into a Dict trait
            # from a config file — it records a deferred merge that gets
            # applied correctly once ServerApp actually loads this config.
            c.ServerApp.jpserver_extensions.update({
                "eg_reconnect_buffer": True,
                "pod_pending_status": True,
            })

            import os
            _wl = frozenset(k.strip() for k in os.environ.get("KERNEL_WHITELIST", "").split(",") if k.strip())
            if _wl:
                # Standard (non-gateway) kernel spec manager
                c.KernelSpecManager.allowed_kernelspecs = set(_wl)

                # Enterprise Gateway's GatewayKernelSpecManager overrides get_all_specs
                # without calling super(), so allowed_kernelspecs config is never applied.
                # Monkey-patch it to filter the results ourselves.
                try:
                    from jupyter_server.gateway.managers import GatewayKernelSpecManager
                    _orig = GatewayKernelSpecManager.get_all_specs

                    async def _filtered_get_all_specs(self):
                        all_specs = await _orig(self)
                        filtered = {name: spec for name, spec in all_specs.items() if name in _wl}
                        _dname = os.environ.get("KERNEL_DISPLAY_NAME", "")
                        if _dname:
                            filtered = {
                                name: {**spec, "spec": {**spec.get("spec", {}), "display_name": _dname}}
                                for name, spec in filtered.items()
                            }
                        return filtered

                    GatewayKernelSpecManager.get_all_specs = _filtered_get_all_specs
                except Exception:
                    pass

            # ── Per-kernel GPU quota enforcement ─────────────────────────────────
            # GatewayMappingKernelManager.start_kernel() is the true entry point
            # called for every POST /api/kernels request.  GatewayKernelManager
            # manages an already-running kernel connection and is NOT called on
            # kernel creation — patching it was a no-op.
            import asyncio, json as _json, logging as _logging, \
                   urllib.request, urllib.error

            _qlog       = _logging.getLogger("quota_kernel_hook")
            _QUOTA_API  = os.environ.get("QUOTA_API_URL", "")
            _QUOTA_TOK  = os.environ.get("QUOTA_API_TOKEN", "")
            _JHUB_USER  = os.environ.get("JUPYTERHUB_USER", "")

            _qlog.warning("quota kernel hook: QUOTA_API_URL=%r USER=%r", _QUOTA_API, _JHUB_USER)

            try:
                from jupyter_server.gateway.managers import GatewayMappingKernelManager

                _orig_mapping_start = GatewayMappingKernelManager.start_kernel

                async def _quota_checked_start_kernel(self, kernel_id=None, path=None, **kwargs):
                    # kernel_name is passed as a kwarg by MappingKernelManager
                    _kname = kwargs.get("kernel_name") or ""
                    if _QUOTA_API and _QUOTA_TOK and _JHUB_USER:
                        _body = _json.dumps({"kernel_name": _kname}).encode()
                        _req  = urllib.request.Request(
                            f"{_QUOTA_API}/quotas/users/{_JHUB_USER}/enforce-kernel",
                            data=_body,
                            headers={
                                "Authorization": f"Bearer {_QUOTA_TOK}",
                                "Content-Type": "application/json",
                            },
                            method="POST",
                        )
                        loop = asyncio.get_event_loop()
                        def _check():
                            try:
                                urllib.request.urlopen(_req, timeout=5)
                                _qlog.warning("enforce-kernel OK for %s kernel=%r", _JHUB_USER, _kname)
                            except urllib.error.HTTPError as _e:
                                if _e.code == 429:
                                    _msg = _e.read().decode()
                                    _qlog.warning("enforce-kernel DENIED for %s: %s", _JHUB_USER, _msg)
                                    raise RuntimeError(_msg)
                                # Non-429 (auth error, network): fail open
                                _qlog.warning("enforce-kernel non-429 error %s for %s — failing open",
                                              _e.code, _JHUB_USER)
                            except Exception as _ex:
                                _qlog.warning("enforce-kernel unreachable for %s — failing open: %s",
                                              _JHUB_USER, _ex)
                        try:
                            await loop.run_in_executor(None, _check)
                        except RuntimeError as _e:
                            raise Exception(str(_e))  # surfaces in JupyterLab as kernel start error
                    else:
                        _qlog.warning("enforce-kernel skipped: missing QUOTA_API_URL/TOKEN/USER")

                    return await _orig_mapping_start(self, kernel_id=kernel_id, path=path, **kwargs)

                GatewayMappingKernelManager.start_kernel = _quota_checked_start_kernel
                _qlog.warning("GatewayMappingKernelManager.start_kernel patched for quota enforcement")

            except Exception as _patch_err:
                _qlog.error("Failed to patch GatewayMappingKernelManager: %s", _patch_err)

