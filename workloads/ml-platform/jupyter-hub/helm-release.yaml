apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jupyterhub
  namespace: jhub-ns
spec:
  interval: 1m
  releaseName: jhub
  chart:
    spec:
      chart: jupyterhub
      version: "4.3.3"
      sourceRef:
        kind: HelmRepository
        name: jupyterhub
        namespace: jhub-ns

  valuesFrom:
    - kind: ConfigMap
      name: jhub-values
      valuesKey: values.yaml