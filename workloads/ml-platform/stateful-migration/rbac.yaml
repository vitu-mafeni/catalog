---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: checkpoint-backup-sa
  namespace: stateful-migration
  labels:
    app.kubernetes.io/name: checkpoint-backup
    app.kubernetes.io/part-of: stateful-migration-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: checkpoint-backup-role
  labels:
    app.kubernetes.io/name: checkpoint-backup
    app.kubernetes.io/part-of: stateful-migration-operator
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "update", "patch"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
- apiGroups: [""]
  resources: ["pods/checkpoint"]
  verbs: ["patch", "create", "update", "proxy"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["nodes/checkpoint"]
  verbs: ["create", "get", "patch", "update", "proxy"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["migration.dcnlab.com"]
  resources: ["checkpointbackups"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["migration.dcnlab.com"]
  resources: ["checkpointbackups/status"]
  verbs: ["get", "update", "patch"]
- apiGroups: ["migration.dcnlab.com"]
  resources: ["checkpointbackups/finalizers"]
  verbs: ["update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: checkpoint-backup-rolebinding
  labels:
    app.kubernetes.io/name: checkpoint-backup
    app.kubernetes.io/part-of: stateful-migration-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: checkpoint-backup-role
subjects:
- kind: ServiceAccount
  name: checkpoint-backup-sa
  namespace: stateful-migration

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: checkpoint-apiserver-sa
  namespace: stateful-migration
  labels:
    app.kubernetes.io/name: checkpoint-apiserver
    app.kubernetes.io/part-of: stateful-migration-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: checkpoint-apiserver-role
  labels:
    app.kubernetes.io/name: checkpoint-apiserver
    app.kubernetes.io/part-of: stateful-migration-operator
rules:
- apiGroups:
  - migration.dcnlab.com
  resources:
  - checkpointbackups
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - migration.dcnlab.com
  resources:
  - checkpointbackups/status
  verbs:
  - get
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: checkpoint-apiserver-rolebinding
  labels:
    app.kubernetes.io/name: checkpoint-apiserver
    app.kubernetes.io/part-of: stateful-migration-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: checkpoint-apiserver-role
subjects:
- kind: ServiceAccount
  name: checkpoint-apiserver-sa
  namespace: stateful-migration
