---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: checkpointbackups.migration.dcnlab.com
spec:
  group: migration.dcnlab.com
  names:
    kind: CheckpointBackup
    listKind: CheckpointBackupList
    plural: checkpointbackups
    singular: checkpointbackup
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: CheckpointBackup is the Schema for the checkpointbackups API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of CheckpointBackup
            properties:
              buildImage:
                description: |-
                  BuildImage specifies whether to build a container image from the checkpoint (default: true)
                  When false, only the checkpoint file is created and stored to checkpoint storage
                type: boolean
              containers:
                description: Containers specifies the container configurations for
                  checkpoints
                items:
                  description: Container defines a container configuration for checkpoints
                  properties:
                    image:
                      description: Image of the container in the registry
                      type: string
                    name:
                      description: Name of the container
                      type: string
                  required:
                  - image
                  - name
                  type: object
                type: array
              metadata:
                description: Metadata holds optional contextual information about
                  the checkpoint origin
                properties:
                  busyCells:
                    description: BusyCells is the list of notebook cells that were
                      actively executing when the checkpoint was created
                    items:
                      description: |-
                        BusyCell holds information about a notebook cell that was actively executing
                        at the time the checkpoint was requested.
                      properties:
                        cellId:
                          description: CellID is the unique identifier of the cell
                          type: string
                        cellIndex:
                          description: CellIndex is the zero-based position of the
                            cell in the notebook
                          type: integer
                        executionCount:
                          description: ExecutionCount is the execution counter value
                            shown next to the cell
                          type: integer
                        msgId:
                          description: MsgID is the kernel message ID associated with
                            the cell execution
                          type: string
                      type: object
                    type: array
                  kernelId:
                    description: KernelID is the Jupyter kernel ID associated with
                      this checkpoint
                    type: string
                  kernelName:
                    description: KernelName is the human-readable name of the Jupyter
                      kernel
                    type: string
                  notebookName:
                    description: NotebookName is the name of the notebook associated
                      with this checkpoint
                    type: string
                  sessionId:
                    description: SessionID is the Jupyter session ID associated with
                      this checkpoint
                    type: string
                type: object
              podRef:
                description: PodRef specifies the pod to checkpoint
                properties:
                  name:
                    description: Name of the referenced pod
                    type: string
                  namespace:
                    description: Namespace of the referenced pod
                    type: string
                required:
                - name
                type: object
              registry:
                description: |-
                  Registry specifies the registry configuration for storing checkpoints
                  If not provided, images will be built locally without pushing to a registry
                properties:
                  repository:
                    description: Repository path in the registry
                    type: string
                  secretRef:
                    description: SecretRef contains credentials for the registry
                    properties:
                      name:
                        description: Name of the referenced secret
                        type: string
                      namespace:
                        description: Namespace of the referenced secret
                        type: string
                    required:
                    - name
                    type: object
                  url:
                    description: URL of the registry
                    type: string
                required:
                - repository
                - url
                type: object
              resourceRef:
                description: ResourceRef specifies the workload to migrate
                properties:
                  apiVersion:
                    description: APIVersion of the referenced resource
                    type: string
                  kind:
                    description: Kind of the referenced resource
                    type: string
                  name:
                    description: Name of the referenced resource
                    type: string
                  namespace:
                    description: Namespace of the referenced resource
                    type: string
                required:
                - apiVersion
                - kind
                - name
                type: object
              schedule:
                description: Schedule specifies the backup schedule in cron format
                  or "immediately" for one-time execution
                type: string
              stopPod:
                description: |-
                  StopPod specifies whether to delete the pod after checkpointing (default: false)
                  When true, the pod will be deleted after successful checkpoint creation and no further schedules will be processed
                type: boolean
            required:
            - podRef
            - resourceRef
            - schedule
            type: object
          status:
            description: status defines the observed state of CheckpointBackup
            properties:
              builtImages:
                description: BuiltImages contains the list of checkpoint images that
                  were successfully built
                items:
                  description: BuiltImage represents a successfully built checkpoint
                    image
                  properties:
                    buildTime:
                      description: BuildTime is when the image was built
                      format: date-time
                      type: string
                    containerName:
                      description: ContainerName is the name of the container that
                        was checkpointed
                      type: string
                    imageName:
                      description: ImageName is the full name of the built checkpoint
                        image
                      type: string
                    pushed:
                      description: Pushed indicates whether the image was pushed to
                        a registry
                      type: boolean
                  required:
                  - containerName
                  - imageName
                  type: object
                type: array
              checkpointFiles:
                description: CheckpointFiles contains the paths to checkpoint files
                  that have been created
                items:
                  description: CheckpointFile represents a checkpoint file that has
                    been created
                  properties:
                    checkpointTime:
                      description: CheckpointTime is when the checkpoint was created
                      format: date-time
                      type: string
                    containerName:
                      description: ContainerName is the name of the container that
                        was checkpointed
                      type: string
                    filePath:
                      description: FilePath is the relative path to the checkpoint
                        file on the node
                      type: string
                    storagePath:
                      description: StoragePath is the path within the checkpoint storage
                        PVC where the file is stored
                      type: string
                  required:
                  - containerName
                  - filePath
                  type: object
                type: array
              conditions:
                description: Conditions represent the latest available observations
                  of the CheckpointBackup's current state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastCheckpointTime:
                description: LastCheckpointTime represents the last time a checkpoint
                  was successfully created
                format: date-time
                type: string
              message:
                description: Message provides additional information about the current
                  state
                type: string
              observedGeneration:
                description: ObservedGeneration reflects the generation of the most
                  recently observed CheckpointBackup
                format: int64
                type: integer
              phase:
                description: Phase represents the current phase of the checkpoint
                  backup operation
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
