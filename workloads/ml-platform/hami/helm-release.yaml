apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hami
  namespace: kube-system
spec:
  interval: 5m
  releaseName: hami
  chart:
    spec:
      chart: hami
      sourceRef:
        kind: HelmRepository
        name: hami
        namespace: kube-system

  values:
    scheduler:
      kubeScheduler:
        # ⚠️ MUST match your Kubernetes version exactly
        # replace this with your actual version
        imageTag: v1.34.0

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3