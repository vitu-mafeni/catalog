apiVersion: v1
kind: ConfigMap
metadata:
  name: upf-config
  namespace: free5gc # kpt-set: ${namespace}
data:
  upfcfg.yaml: |
    version: 1.0.3
    description: UPF initial local configuration

    pfcp:
      addr: 192.168.11.202 # kpt-set: ${upf-n4-ip}
      nodeID: 192.168.11.202 # kpt-set: ${upf-n4-ip}
      retransTimeout: 1s
      maxRetrans: 3

    gtpu:
      forwarder: gtp5g
      ifList:
        - addr: 192.168.12.201 # kpt-set: ${upf-n3-ip}
          type: N3
          name: upf-n3

    dnnList:
      - dnn: internet # kpt-set: ${dnn}
        cidr: 10.1.0.0/16 # kpt-set: ${ue-subnet}
        natifname: net3

    logger:
      enable: true
      level: info
      reportCaller: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: upf
  namespace: free5gc # kpt-set: ${namespace}
  labels:
    app: upf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: upf
  template:
    metadata:
      labels:
        app: upf
      annotations:
        k8s.v1.cni.cncf.io/networks: free5gc-upf-n3, free5gc-upf-n4, free5gc-upf-n6
    spec:
      nodeName: ip-192-168-1-57.ap-northeast-2.compute.internal # kpt-set: ${edge-worker-node}
      initContainers:
        - name: check-gtp5g
          image: busybox:1.36
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
          command:
            - sh
            - -c
            - |
              grep -q gtp5g /host/proc/modules && echo "gtp5g module loaded OK" || \
              (echo "ERROR: gtp5g kernel module not loaded on host."; \
               echo "Run on edge worker: sudo modprobe gtp5g"; \
               exit 1)
      containers:
        - name: upf
          image: free5gc/upf:v3.4.3 # kpt-set: ${image-upf}
          command: ["./upf", "-c", "/free5gc/config/upfcfg.yaml"]
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
                - SYS_MODULE
          volumeMounts:
            - name: upf-config
              mountPath: /free5gc/config/upfcfg.yaml
              subPath: upfcfg.yaml
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: upf-config
          configMap:
            name: upf-config
        - name: host-proc
          hostPath:
            path: /proc
---
apiVersion: v1
kind: Service
metadata:
  name: upf-service
  namespace: free5gc # kpt-set: ${namespace}
  labels:
    app: upf
spec:
  selector:
    app: upf
  type: ClusterIP
  ports:
    - name: pfcp
      port: 8805
      targetPort: 8805
      protocol: UDP
