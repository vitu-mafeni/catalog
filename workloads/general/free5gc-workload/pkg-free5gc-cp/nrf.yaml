apiVersion: v1
kind: ConfigMap
metadata:
  name: nrf-config
  namespace: free5gc # kpt-set: ${namespace}
data:
  nrfcfg.yaml: |
    info:
      version: 1.0.2
      description: NRF initial local configuration
    configuration:
      MongoDBName: free5gc
      MongoDBUrl: mongodb://mongodb:27017 # kpt-set: ${mongodb-uri}
      sbi:
        scheme: https
        registerIPv4: nrf-service # kpt-set: ${nrf-service-name}
        bindingIPv4: 0.0.0.0
        port: 8000
        tls:
          key: cert/nrf.key
          pem: cert/nrf.pem
      DefaultPlmnId:
        mcc: "001" # kpt-set: ${plmn-mcc}
        mnc: "01"  # kpt-set: ${plmn-mnc}
      serviceNameList:
        - nnrf-nfm
        - nnrf-disc
    logger:
      enable: true
      level: info
      reportCaller: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nrf
  namespace: free5gc # kpt-set: ${namespace}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nrf
  template:
    metadata:
      labels:
        app: nrf
    spec:
      initContainers:
      - name: wait-mongo
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -zw3 mongodb.free5gc.svc.cluster.local 27017; do echo waiting for mongodb; sleep 2; done']
      containers:
      - name: nrf
        image: free5gc/nrf:v3.4.3 # kpt-set: ${image-nrf}
        imagePullPolicy: IfNotPresent
        command: ["./nrf", "-c", "/free5gc/config/nrfcfg.yaml"]
        ports:
        - containerPort: 8000
        volumeMounts:
        - name: config
          mountPath: /free5gc/config/nrfcfg.yaml
          subPath: nrfcfg.yaml
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        readinessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: config
        configMap:
          name: nrf-config
---
apiVersion: v1
kind: Service
metadata:
  name: nrf-service # kpt-set: ${nrf-service-name}
  namespace: free5gc # kpt-set: ${namespace}
spec:
  selector:
    app: nrf
  ports:
  - name: sbi
    port: 8000
    targetPort: 8000
