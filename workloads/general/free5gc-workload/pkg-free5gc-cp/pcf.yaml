apiVersion: v1
kind: ConfigMap
metadata:
  name: pcf-config
  namespace: free5gc # kpt-set: ${namespace}
data:
  pcfcfg.yaml: |
    info:
      version: 1.0.2
      description: PCF initial local configuration

    configuration:
      pcfName: PCF

      sbi:
        scheme: https
        registerIPv4: pcf-service
        bindingIPv4: 0.0.0.0
        port: 8000
        tls:
          key: cert/pcf.key
          pem: cert/pcf.pem

      timeFormat: 2019-01-02 15:04:05
      defaultBdtRefId: BdtPolicyId-

      nrfUri: https://nrf-service:8000 # kpt-set: ${nrf-uri}

      serviceList:
        - serviceName: npcf-am-policy-control
        - serviceName: npcf-smpolicycontrol
          suppFeat: "3fff"
        - serviceName: npcf-bdtpolicycontrol
        - serviceName: npcf-policyauthorization
          suppFeat: "3"
        - serviceName: npcf-eventexposure
        - serviceName: npcf-ue-policy-control

      mongodb:
        name: free5gc
        url: mongodb://mongodb:27017 # kpt-set: ${mongodb-uri}

      locality: area1

    logger:
      enable: true
      level: info
      reportCaller: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pcf
  namespace: free5gc # kpt-set: ${namespace}
  labels:
    app: pcf
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pcf
  template:
    metadata:
      labels:
        app: pcf
    spec:
      initContainers:
        - name: wait-nrf
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -zw3 nrf-service.free5gc.svc.cluster.local 8000; do
                echo waiting for nrf
                sleep 2
              done
      containers:
        - name: pcf
          image: free5gc/pcf:v3.4.3 # kpt-set: ${image-pcf}
          imagePullPolicy: IfNotPresent
          workingDir: /free5gc
          command: ["/free5gc/pcf", "-c", "/free5gc/config/pcfcfg.yaml"]
          ports:
            - containerPort: 8000
              name: sbi
          volumeMounts:
            - name: config
              mountPath: /free5gc/config/pcfcfg.yaml
              subPath: pcfcfg.yaml
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: pcf-config
---
apiVersion: v1
kind: Service
metadata:
  name: pcf-service
  namespace: free5gc # kpt-set: ${namespace}
  labels:
    app: pcf
spec:
  selector:
    app: pcf
  ports:
    - name: sbi
      port: 8000
      targetPort: 8000
