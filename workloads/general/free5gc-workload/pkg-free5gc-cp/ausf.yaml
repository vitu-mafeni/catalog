apiVersion: v1
kind: ConfigMap
metadata:
  name: ausf-config
  namespace: free5gc # kpt-set: ${namespace}
data:
  ausfcfg.yaml: |
    info:
      version: 1.0.3
      description: AUSF initial local configuration
    configuration:
      sbi:
        scheme: https
        registerIPv4: ausf-service
        bindingIPv4: 0.0.0.0
        port: 8000
        tls:
          key: cert/ausf.key
          pem: cert/ausf.pem
      serviceNameList:
        - nausf-auth
      nrfUri: https://nrf-service:8000 # kpt-set: ${nrf-service-name}
      plmnSupportList:
        - mcc: "001" # kpt-set: ${plmn-mcc}
          mnc: "01"  # kpt-set: ${plmn-mnc}
      groupId: ausfGroup001
    logger:
      enable: true
      level: info
      reportCaller: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ausf
  namespace: free5gc # kpt-set: ${namespace}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ausf
  template:
    metadata:
      labels:
        app: ausf
    spec:
      initContainers:
      - name: wait-udm
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -zw3 udm-service.free5gc.svc.cluster.local 8000; do echo waiting for udm; sleep 2; done']
      containers:
      - name: ausf
        image: free5gc/ausf:v3.4.3 # kpt-set: ${image-ausf}
        imagePullPolicy: IfNotPresent
        command: ["./ausf", "-c", "/free5gc/config/ausfcfg.yaml"]
        ports:
        - containerPort: 8000
        volumeMounts:
        - name: config
          mountPath: /free5gc/config/ausfcfg.yaml
          subPath: ausfcfg.yaml
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
      volumes:
      - name: config
        configMap:
          name: ausf-config
---
apiVersion: v1
kind: Service
metadata:
  name: ausf-service
  namespace: free5gc # kpt-set: ${namespace}
spec:
  selector:
    app: ausf
  ports:
  - name: sbi
    port: 8000
    targetPort: 8000
