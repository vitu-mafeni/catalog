apiVersion: v1
kind: ConfigMap
metadata:
  name: amf-config
  namespace: free5gc # kpt-set: ${namespace}
data:
  amfcfg.yaml: |
    info:
      version: 1.0.9
      description: AMF initial local configuration
    configuration:
      amfName: AMF
      ngapIpList:
        - 192.168.10.200 # kpt-set: ${amf-n2-ip}
      ngapPort: 38412
      sbi:
        scheme: https
        registerIPv4: amf-service
        bindingIPv4: 0.0.0.0
        port: 8000
        tls:
          key: cert/amf.key
          pem: cert/amf.pem
      serviceNameList:
        - namf-comm
        - namf-evts
        - namf-mt
        - namf-loc
        - namf-oam
      servedGuamiList:
        - plmnId:
            mcc: "001" # kpt-set: ${plmn-mcc}
            mnc: "01"  # kpt-set: ${plmn-mnc}
          amfId: cafe00 # kpt-set: ${amf-id}
      supportTaiList:
        - plmnId:
            mcc: "001" # kpt-set: ${plmn-mcc}
            mnc: "01"  # kpt-set: ${plmn-mnc}
          tac: "000001" # kpt-set: ${tac}
      plmnSupportList:
        - plmnId:
            mcc: "001" # kpt-set: ${plmn-mcc}
            mnc: "01"  # kpt-set: ${plmn-mnc}
          snssaiList:
            - sst: 1   # kpt-set: ${sst}
              sd: "010203" # kpt-set: ${sd}
      supportDnnList:
        - internet # kpt-set: ${dnn}
      nrfUri: https://nrf-service:8000
      security:
        integrityOrder:
          - NIA2
          - NIA1
          - NIA0
        cipheringOrder:
          - NEA0
          - NEA2
          - NEA1
      networkName:
        full: free5GC
        short: free5GC
      locality: area1
      t3502Value: 720
      t3512Value: 3600
      non3gppDeregistrationTimerValue: 3240
      t3513:
        enable: true
        expireTime: 6s
        maxRetryTimes: 4
      t3522:
        enable: true
        expireTime: 6s
        maxRetryTimes: 4
      t3550:
        enable: true
        expireTime: 6s
        maxRetryTimes: 4
      t3555:
        enable: true
        expireTime: 6s
        maxRetryTimes: 4
      t3560:
        enable: true
        expireTime: 6s
        maxRetryTimes: 4
      t3565:
        enable: true
        expireTime: 6s
        maxRetryTimes: 4
      t3570:
        enable: true
        expireTime: 6s
        maxRetryTimes: 4
    logger:
      enable: true
      level: info
      reportCaller: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: amf
  namespace: free5gc # kpt-set: ${namespace}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: amf
  template:
    metadata:
      labels:
        app: amf
      annotations:
        k8s.v1.cni.cncf.io/networks: free5gc-amf-n2
    spec:
      nodeName: ip-192-168-1-176.ap-northeast-2.compute.internal # kpt-set: ${core-worker-node}
      initContainers:
      - name: wait-nrf
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -zw3 nrf-service.free5gc.svc.cluster.local 8000; do echo waiting for nrf; sleep 2; done']
      containers:
      - name: amf
        image: free5gc/amf:v3.4.3 # kpt-set: ${image-amf}
        imagePullPolicy: IfNotPresent
        command: ["./amf", "-c", "/free5gc/config/amfcfg.yaml"]
        ports:
        - name: sbi
          containerPort: 8000
        - name: ngap
          containerPort: 38412
          protocol: SCTP
        securityContext:
          capabilities:
            add: ["NET_ADMIN"]
        volumeMounts:
        - name: config
          mountPath: /free5gc/config/amfcfg.yaml
          subPath: amfcfg.yaml
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
      volumes:
      - name: config
        configMap:
          name: amf-config
---
apiVersion: v1
kind: Service
metadata:
  name: amf-service
  namespace: free5gc # kpt-set: ${namespace}
spec:
  selector:
    app: amf
  ports:
  - name: sbi
    port: 8000
    targetPort: 8000
  - name: ngap
    port: 38412
    targetPort: 38412
    protocol: SCTP
