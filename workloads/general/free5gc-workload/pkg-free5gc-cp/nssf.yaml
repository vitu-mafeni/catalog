apiVersion: v1
kind: ConfigMap
metadata:
  name: nssf-config
  namespace: free5gc # kpt-set: ${namespace}
data:
  nssfcfg.yaml: |
    info:
      version: 1.0.2
      description: NSSF initial local configuration

    configuration:
      nssfName: NSSF
      sbi:
        scheme: https
        registerIPv4: nssf-service
        bindingIPv4: 0.0.0.0
        port: 8000
        tls:
          pem: cert/nssf.pem
          key: cert/nssf.key
      serviceNameList:
        - nnssf-nsselection
        - nnssf-nssaiavailability
      nrfUri: https://nrf-service:8000 # kpt-set: ${nrf-uri}
      nrfCertPem: cert/nrf.pem

      supportedPlmnList:
        - mcc: "001" # kpt-set: ${plmn-mcc}
          mnc: "01"  # kpt-set: ${plmn-mnc}

      supportedNssaiInPlmnList:
        - plmnId:
            mcc: "001" # kpt-set: ${plmn-mcc}
            mnc: "01"  # kpt-set: ${plmn-mnc}
          supportedSnssaiList:
            - sst: 1        # kpt-set: ${sst}
              sd: "010203"  # kpt-set: ${sd}

      nsiList:
        - snssai:
            sst: 1        # kpt-set: ${sst}
            sd: "010203"  # kpt-set: ${sd}
          nsiInformationList:
            - nrfId: https://nrf-service:8000/nnrf-nfm/v1/nf-instances
              nsiId: 1

      amfSetList:
        - amfSetId: 1
          nrfAmfSet: https://nrf-service:8000/nnrf-nfm/v1/nf-instances
          supportedNssaiAvailabilityData:
            - tai:
                plmnId:
                  mcc: "001" # kpt-set: ${plmn-mcc}
                  mnc: "01"  # kpt-set: ${plmn-mnc}
                tac: "000001" # kpt-set: ${tac}
              supportedSnssaiList:
                - sst: 1        # kpt-set: ${sst}
                  sd: "010203"  # kpt-set: ${sd}

      taList:
        - tai:
            plmnId:
              mcc: "001" # kpt-set: ${plmn-mcc}
              mnc: "01"  # kpt-set: ${plmn-mnc}
            tac: "000001" # kpt-set: ${tac}
          accessType: 3GPP_ACCESS
          supportedSnssaiList:
            - sst: 1        # kpt-set: ${sst}
              sd: "010203"  # kpt-set: ${sd}

      locality: areal
    logger:
      enable: true
      level: info
      reportCaller: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nssf
  namespace: free5gc # kpt-set: ${namespace}
  labels:
    app: nssf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nssf
  template:
    metadata:
      labels:
        app: nssf
    spec:
      initContainers:
        - name: wait-nrf
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -zw3 nrf-service.free5gc.svc.cluster.local 8000; do
                echo waiting for nrf
                sleep 2
              done
      containers:
        - name: nssf
          image: free5gc/nssf:v3.4.3 # kpt-set: ${image-nssf}
          imagePullPolicy: IfNotPresent
          workingDir: /free5gc
          command: ["/free5gc/nssf", "-c", "/free5gc/config/nssfcfg.yaml"]
          ports:
            - containerPort: 8000
              name: sbi
          volumeMounts:
            - name: config
              mountPath: /free5gc/config/nssfcfg.yaml
              subPath: nssfcfg.yaml
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: nssf-config
---
apiVersion: v1
kind: Service
metadata:
  name: nssf-service
  namespace: free5gc # kpt-set: ${namespace}
  labels:
    app: nssf
spec:
  selector:
    app: nssf
  ports:
    - name: sbi
      port: 8000
      targetPort: 8000
