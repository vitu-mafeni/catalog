apiVersion: v1
kind: ConfigMap
metadata:
  name: ue-config
  namespace: free5gc # kpt-set: ${namespace}
data:
  ue.yaml: |
    supi: 'imsi-001010000000001'  # kpt-set: ${ue-imsi}
    mcc: '001'   # kpt-set: ${plmn-mcc}
    mnc: '01'    # kpt-set: ${plmn-mnc}
    key: '8baf473f2f8fd09487cccbd7097c6862'   # kpt-set: ${ue-key}
    op: '8e27b6af0e692e750f32667a3b14605d'    # kpt-set: ${ue-opc}
    opType: 'OPC'
    amf: '8000'
    imeiSv: '0035609204079514'
    gnbSearchList:
      - 192.168.10.204  # kpt-set: ${gnb-n2-ip}
    uacAic:
      mps: false
      mcs: false
    uacAcc:
      normalClass: 0
      class11: false
      class12: false
      class13: false
      class14: false
      class15: false
    sessions:
      - type: 'IPv4'
        apn: 'internet'  # kpt-set: ${ue-apn}
        slice:
          sst: 0x01
          sd: 0x010203
    configured-nssai:
      - sst: 0x01
        sd: 0x010203
    default-nssai:
      - sst: 1
        sd: 0x010203
    integrity:
      IA1: true
      IA2: true
      IA3: true
    ciphering:
      EA1: true
      EA2: true
      EA3: true
    integrityMaxRate:
      uplink: 'full'
      downlink: 'full'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ue
  namespace: free5gc # kpt-set: ${namespace}
  labels:
    app: ue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ue
  template:
    metadata:
      labels:
        app: ue
    spec:
      nodeName: ip-192-168-1-57.ap-northeast-2.compute.internal # kpt-set: ${edge-worker-node}
      initContainers:
        - name: wait-for-gnb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until ping -c 1 -W 2 192.168.10.204 >/dev/null 2>&1; do
                echo "Waiting for gNB (192.168.10.204) to be reachable..."
                sleep 3
              done
              echo "gNB is ready"
      containers:
        - name: ue
          image: free5gc/ueransim:v3.4.3 # kpt-set: ${image-ueransim}
          command: ["/ueransim/nr-ue", "-c", "/ueransim/config/ue.yaml"]
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
          volumeMounts:
            - name: ue-config
              mountPath: /ueransim/config/
      volumes:
        - name: ue-config
          configMap:
            name: ue-config
