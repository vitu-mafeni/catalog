apiVersion: v1
kind: ConfigMap
metadata:
  name: setters
  annotations:
    config.kubernetes.io/local-config: "true"
data:
  namespace: free5gc
  # gNB N2: edge-n2 subnet (192.168.10.0/24) on ens6
  gnb-n2-ip: 192.168.10.204
  gnb-n2-subnet: "24"
  gnb-n2-gateway: 192.168.10.1
  # gNB N3: edge-n3 subnet (192.168.12.0/24) on ens8
  gnb-n3-ip: 192.168.12.205
  gnb-n3-subnet: "24"
  gnb-n3-gateway: 192.168.12.1
  # AMF N2 IP on core worker
  amf-n2-ip: 192.168.10.200
  # UPF N3 IP on edge worker
  upf-n3-ip: 192.168.12.201
  plmn-mcc: "001"
  plmn-mnc: "01"
  tac: "1"
  sst: "1"
  sd: "010203"
  dnn: internet
  ue-imsi: imsi-001010000000001
  ue-key: 8baf473f2f8fd09487cccbd7097c6862
  ue-opc: 8e27b6af0e692e750f32667a3b14605d
  ue-apn: internet
  gnb-id: "0x000001"
  # Worker node name to schedule gNB/UE on edge worker
  edge-worker-node: ip-192-168-1-57.ap-northeast-2.compute.internal
  image-ueransim: free5gc/ueransim:v3.4.3
